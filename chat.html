<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plural Chat - Pink Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; }
        * { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); }
        body { background-color: var(--bg); margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        
        nav { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; }
        .nav-link { padding: 10px 20px; border: 2px solid var(--magenta); background: white; border-radius: 50px; text-decoration: none; font-weight: bold; }

        .discord-container { display: flex; flex: 1; background: white; border: 3px solid var(--magenta); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(255,0,255,0.1); }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background: var(--soft-pink); border-right: 2px solid var(--magenta); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-weight: bold; border-bottom: 1px solid var(--magenta); text-align: center; }
        .friend-item { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,0,255,0.1); transition: 0.2s; }
        .friend-item:hover, .friend-item.active { background: white; }

        /* Chat Area Styles */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #message-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Proxy Message Styles */
        .msg-row { display: flex; gap: 12px; }
        .msg-pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid; object-fit: cover; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-header { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .proxy-tag { background: var(--magenta); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }

        /* Input Area */
        .input-bar { padding: 20px; border-top: 2px solid var(--magenta); display: flex; gap: 10px; background: white; }
        select, input { padding: 12px; border: 2px solid var(--soft-pink); border-radius: 12px; outline: none; }
        input:focus { border-color: var(--magenta); }
        .send-btn { background: var(--magenta); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="chat.html" class="nav-link" style="background: var(--magenta); color: white;">Global Chat</a>
</nav>

<div class="discord-container">
    <div class="sidebar">
        <div class="sidebar-header">Direct Messages</div>
        <div id="friends-list">Loading friends...</div>
    </div>

    <div class="chat-area">
        <div id="message-list">
            <div style="margin: auto; opacity: 0.5;">Select a friend to start chatting</div>
        </div>

        <div class="input-bar">
            <select id="proxy-select" title="Choose who is speaking"></select>
            <input type="text" id="msg-input" placeholder="Message..." style="flex: 1;">
            <button class="send-btn" onclick="sendProxyMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let currentFriendId = null;
    let myAlters = [];

    async function initChat() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return window.location.href = "index.html";
        currentUser = user;

        // 1. Load your alters for proxying
        const { data: profile } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
        myAlters = profile.system_data.members || [];
        const select = document.getElementById('proxy-select');
        myAlters.forEach(alt => {
            select.innerHTML += `<option value="${alt.id}">${alt.name}</option>`;
        });

        // 2. Load Friends List
        loadFriends();
        
        // 3. Realtime Listener
        _supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'global_messages' }, payload => {
            if (payload.new.conversation_id === getConvId(currentFriendId)) {
                renderMessage(payload.new);
            }
        }).subscribe();
    }

    async function loadFriends() {
        const { data: connections } = await _supabase.from('connections').select('friend_id').eq('user_id', currentUser.id);
        const friendIds = connections.map(c => c.friend_id);
        
        const { data: friendProfiles } = await _supabase.from('profiles').select('user_id, username').in('user_id', friendIds);
        
        const list = document.getElementById('friends-list');
        list.innerHTML = '';
        friendProfiles.forEach(f => {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerText = `@${f.username}`;
            div.onclick = () => selectFriend(f.user_id, div);
            list.appendChild(div);
        });
    }

    function getConvId(fId) {
        // Creates a unique ID for the pair (e.g., "id1_id2")
        return [currentUser.id, fId].sort().join('_');
    }

    async function selectFriend(fId, element) {
        currentFriendId = fId;
        document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        
        const convId = getConvId(fId);
        const { data: msgs } = await _supabase.from('global_messages')
            .select('*')
            .eq('conversation_id', convId)
            .order('created_at', { ascending: true });

        const list = document.getElementById('message-list');
        list.innerHTML = '';
        msgs.forEach(m => renderMessage(m));
    }

    function renderMessage(msg) {
        const list = document.getElementById('message-list');
        const div = document.createElement('div');
        div.className = 'msg-row';
        div.innerHTML = `
            <img src="${msg.sender_pfp}" class="msg-pfp" style="border-color: ${msg.sender_color}">
            <div class="msg-content">
                <div class="msg-header">
                    <b style="color: ${msg.sender_color}">${msg.sender_name}</b>
                    <span class="proxy-tag">Proxy</span>
                </div>
                <div style="color: #333; margin-top: 4px;">${msg.message_text}</div>
            </div>
        `;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendProxyMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value || !currentFriendId) return;

        const alterId = document.getElementById('proxy-select').value;
        const alter = myAlters.find(a => a.id == alterId);

        await _supabase.from('global_messages').insert([{
            conversation_id: getConvId(currentFriendId),
            sender_name: alter.name,
            sender_pfp: alter.pfp,
            sender_color: alter.color,
            message_text: input.value
        }]);

        input.value = '';
    }

    window.onload = initChat;
</script>
</body>
</html>
