<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Global Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f6; --magenta: #ff00ff; --soft-pink: #ffdeeb; }
        body { background: var(--bg); font-family: Georgia; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Navigation Styles */
        nav { margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { 
            padding: 10px 20px; border: 2px solid var(--magenta); background: white; 
            cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s;
            text-decoration: none; color: var(--magenta); display: inline-block;
        }
        .tab-btn.active { background: var(--magenta); color: white !important; }

        #chat-container { width: 100%; max-width: 900px; background: white; height: 75vh; border: 3px solid var(--magenta); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(255, 0, 255, 0.05); }
        #message-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 12px; align-items: flex-start; }
        .msg-pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid; object-fit: cover; }
        .input-area { padding: 20px; background: var(--soft-pink); display: flex; gap: 10px; }
        
        input, select { padding: 10px; border-radius: 10px; border: 1px solid var(--magenta); }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="tab-btn">Dashboard</a>
    <a href="chat.html" class="tab-btn active">Global Chat</a>
    <button class="tab-btn" style="border-color: #aaa; color: #aaa;" onclick="logout()">Logout</button>
</nav>

<div id="chat-container">
    <div id="message-list"></div>
    
    <div class="input-area">
        <select id="speaker-select" style="width: 150px;"></select>
        <input type="text" id="msg-input" placeholder="Say something..." style="flex: 1;">
        <button onclick="sendGlobalMessage()" style="background: var(--magenta); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold;">Send</button>
    </div>
</div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let myMembers = [];

    async function initChat() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) {
            alert("Please login on the main page first!");
            window.location.href = "index.html";
            return;
        }

        const { data } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
        if(data?.system_data?.members) {
            myMembers = data.system_data.members;
            const select = document.getElementById('speaker-select');
            myMembers.forEach(m => {
                select.innerHTML += `<option value="${m.id}">${m.name}</option>`;
            });
        }

        loadMessages();
        
        _supabase
            .channel('public:global_messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'global_messages' }, payload => {
                renderMessage(payload.new);
            })
            .subscribe();
    }

    async function loadMessages() {
        const { data } = await _supabase.from('global_messages').select('*').order('created_at', { ascending: true }).limit(50);
        if(data) data.forEach(msg => renderMessage(msg));
    }

    function renderMessage(msg) {
        const list = document.getElementById('message-list');
        const div = document.createElement('div');
        div.className = 'msg-row';
        div.innerHTML = `
            <img src="${msg.sender_pfp}" class="msg-pfp" style="border-color: ${msg.sender_color}">
            <div>
                <b style="color: ${msg.sender_color}">${msg.sender_name}</b>
                <p style="margin: 5px 0; color: #333; line-height: 1.4;">${msg.message_text}</p>
            </div>
        `;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendGlobalMessage() {
        const input = document.getElementById('msg-input');
        const speakerId = document.getElementById('speaker-select').value;
        const alter = myMembers.find(m => m.id == speakerId);

        if(!input.value || !alter) return;

        const { error } = await _supabase.from('global_messages').insert([{
            sender_name: alter.name,
            sender_pfp: alter.pfp,
            sender_color: alter.color,
            message_text: input.value,
            channel_slug: 'general'
        }]);

        if(error) console.error("Error sending:", error);
        input.value = '';
    }

    async function logout() { 
        await _supabase.auth.signOut(); 
        window.location.href = "index.html"; 
    }

    window.onload = initChat;

    // Allow pressing "Enter" to send
    document.getElementById("msg-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendGlobalMessage();
        }
    });
</script>
</body>
</html>
