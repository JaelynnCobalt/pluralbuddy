<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pink Discord</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #fff0f6;
            --panel: #ffffff;
            --magenta: #ff00ff;
            --soft-pink: #ffdeeb;
            --discord-dark: #36393f;
        }

        body { 
            margin: 0; 
            font-family: 'Georgia', serif; 
            background: var(--bg); 
            display: flex; 
            height: 100vh; 
        }

        /* SIDEBAR */
        .sidebar { 
            width: 240px; 
            background: white; 
            border-right: 2px solid var(--soft-pink); 
            display: flex; 
            flex-direction: column; 
            padding: 20px;
        }

        .nav-back { 
            color: var(--magenta); 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.9rem; 
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 25px;
            padding: 10px;
            border-radius: 10px;
            background: var(--bg);
            transition: 0.3s;
        }

        .nav-back:hover { background: var(--soft-pink); }

        .sidebar-title { font-weight: bold; color: var(--magenta); margin-bottom: 15px; text-transform: uppercase; font-size: 0.8rem; }

        /* CHAT AREA */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px 25px; border-bottom: 2px solid var(--soft-pink); font-weight: bold; color: var(--magenta); }
        
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .msg-bubble { display: flex; gap: 12px; max-width: 80%; }
        .msg-pfp { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; border: 2px solid var(--soft-pink); }
        .msg-info { display: flex; flex-direction: column; }
        .msg-name { font-weight: bold; font-size: 0.9rem; color: var(--magenta); }
        .msg-text { background: var(--bg); padding: 10px 15px; border-radius: 0 15px 15px 15px; color: #444; margin-top: 4px; line-height: 1.4; }

        /* INPUT */
        .input-box { padding: 20px; border-top: 2px solid var(--soft-pink); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 2px solid var(--soft-pink); border-radius: 12px; outline: none; }
        button { background: var(--magenta); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="index.html" class="nav-back">🏠 Back to Dashboard</a>
        
        <div class="sidebar-title">Channels</div>
        <div style="color: var(--magenta); font-weight: bold; padding-left: 10px;"># global-lobby</div>
        
        <div class="sidebar-title" style="margin-top: 30px;">Online Systems</div>
        <div id="user-list" style="font-size: 0.85rem; color: #666; padding-left: 10px;">Loading systems...</div>
    </div>

    <div class="chat-main">
        <div class="chat-header"># global-lobby</div>
        <div id="messages"></div>
        
        <div class="input-area">
            <div style="padding: 0 20px; font-size: 0.75rem; color: #aaa;">Sending as: <span id="current-identity" style="color:var(--magenta); font-weight:bold;">Loading...</span></div>
            <div class="input-box">
                <input type="text" id="msg-input" placeholder="Message #global-lobby">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let currentUsername = "Anonymous System";

    async function init() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;

        const { data: profile } = await _supabase.from('profiles').select('username').eq('user_id', user.id).single();
        currentUsername = profile?.username || "Unnamed System";
        document.getElementById('current-identity').innerText = currentUsername;

        loadMessages();
        subscribeMessages();
    }

    async function loadMessages() {
        const { data } = await _supabase.from('global_chat').select('*').order('created_at', { ascending: true }).limit(50);
        if (data) data.forEach(appendMessage);
    }

    function subscribeMessages() {
        _supabase.channel('global_chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'global_chat' }, payload => {
            appendMessage(payload.new);
        }).subscribe();
    }

    function appendMessage(msg) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'msg-bubble';
        div.innerHTML = `
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${msg.username}" class="msg-pfp">
            <div class="msg-info">
                <span class="msg-name">${msg.username}</span>
                <span class="msg-text">${msg.content}</span>
            </div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const content = input.value.trim();
        if (!content) return;

        await _supabase.from('global_chat').insert([{
            user_id: currentUser.id,
            username: currentUsername,
            content: content
        }]);
        input.value = '';
    }

    document.getElementById('msg-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') sendMessage();
    });

    init();
</script>
</body>
</html>
