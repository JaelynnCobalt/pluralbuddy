<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; }
        * { font-family: 'Georgia', serif; box-box-sizing: border-box; color: var(--magenta); -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Navigation - Hidden on very small screens to save space */
        nav { padding: 10px; display: flex; gap: 8px; justify-content: center; background: white; border-bottom: 2px solid var(--magenta); }
        .nav-link { padding: 6px 15px; border: 2px solid var(--magenta); background: white; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        .discord-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* Sidebar: Full width on mobile when active */
        .sidebar { 
            width: 280px; 
            background: var(--soft-pink); 
            border-right: 2px solid var(--magenta); 
            display: flex; 
            flex-direction: column; 
            z-index: 10;
            transition: transform 0.3s ease;
        }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: white; width: 100%; }
        
        #chat-header { 
            padding: 10px 15px; 
            border-bottom: 2px solid var(--soft-pink); 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            background: white;
        }

        /* Mobile "Back to Friends" Button */
        .mobile-back { 
            display: none; 
            background: var(--magenta); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            padding: 5px 10px; 
            font-weight: bold;
        }

        #message-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Styling */
        .msg-row { display: flex; gap: 10px; align-items: flex-start; }
        .msg-pfp { width: 38px; height: 38px; border-radius: 10px; border: 2px solid; object-fit: cover; flex-shrink: 0; }
        .proxy-tag { background: var(--magenta); color: white; font-size: 0.55rem; padding: 1px 4px; border-radius: 3px; vertical-align: middle; }

        /* Input Bar - Sticky at bottom */
        .input-bar { padding: 10px; border-top: 2px solid var(--magenta); display: flex; gap: 8px; background: white; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        select { width: 80px; font-size: 0.8rem; }
        input { flex: 1; padding: 10px; border: 2px solid var(--soft-pink); border-radius: 12px; font-size: 16px; /* Prevents iOS zoom on focus */ }
        .send-btn { background: var(--magenta); color: white; border: none; padding: 0 15px; border-radius: 12px; font-weight: bold; }

        /* MOBILE OVERRIDES */
        @media (max-width: 768px) {
            .sidebar { 
                position: absolute; 
                left: 0; top: 0; bottom: 0; 
                width: 100%; 
                transform: translateX(0); 
            }
            .sidebar.hidden { transform: translateX(-100%); }
            .mobile-back { display: block; }
            
            /* Make list items bigger for fingers */
            .friend-item { padding: 18px !important; font-size: 1.1rem; }
        }

        /* Helper Styles */
        .friend-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,0,255,0.1); display: flex; align-items: center; gap: 10px; }
        .friend-item.active { background: white; font-weight: bold; }
        .sidebar-header { padding: 15px; font-weight: bold; background: white; border-bottom: 1px solid var(--magenta); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://raw.githubusercontent.com/Anisayari/Discord-Alert-Sound/main/discord_notification.mp3" preload="auto"></audio>

<div class="discord-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Conversations</span>
            <button style="background:var(--magenta); color:white; border:none; border-radius:50%; width:30px; height:30px;" onclick="openModal()">+</button>
        </div>
        <div id="dm-list" style="overflow-y:auto;"></div>
    </div>

    <div class="chat-area">
        <div id="chat-header">
            <button class="mobile-back" onclick="toggleSidebar(true)">← Friends</button>
            <span id="chat-title">Select a chat</span>
        </div>
        
        <div id="message-list"></div>

        <div class="input-bar">
            <select id="proxy-select"></select>
            <input type="text" id="msg-input" placeholder="Message..." enterkeyhint="send">
            <button class="send-btn" onclick="sendProxyMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let currentChatId = null;
    let myAlters = [];

    async function init() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return window.location.href = "index.html";
        currentUser = user;

        const { data: profile } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
        myAlters = profile?.system_data?.members || [];
        const select = document.getElementById('proxy-select');
        myAlters.forEach(alt => select.innerHTML += `<option value="${alt.id}">${alt.name}</option>`);

        loadSidebar();
        setupRealtime();
    }

    function toggleSidebar(show) {
        const sb = document.getElementById('sidebar');
        if(show) sb.classList.remove('hidden');
        else sb.classList.add('hidden');
    }

    async function loadSidebar() {
        const { data: connections } = await _supabase.from('connections').select('friend_id').eq('user_id', currentUser.id);
        const friendIds = connections?.map(c => c.friend_id) || [];
        const { data: profiles } = await _supabase.from('profiles').select('user_id, username').in('user_id', friendIds);
        
        const list = document.getElementById('dm-list');
        list.innerHTML = '';
        profiles?.forEach(f => {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `🩷 @${f.username}`;
            div.onclick = () => {
                selectChat([currentUser.id, f.user_id].sort().join('_'), `@${f.username}`);
                if(window.innerWidth <= 768) toggleSidebar(false);
            };
            list.appendChild(div);
        });
    }

    async function selectChat(id, title) {
        currentChatId = id;
        document.getElementById('chat-title').innerText = title;
        const { data: msgs } = await _supabase.from('global_messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
        const list = document.getElementById('message-list');
        list.innerHTML = '';
        msgs?.forEach(m => renderMessage(m));
    }

    function renderMessage(msg) {
        const list = document.getElementById('message-list');
        const div = document.createElement('div');
        div.className = 'msg-row';
        div.innerHTML = `
            <img src="${msg.sender_pfp}" class="msg-pfp" style="border-color:${msg.sender_color}">
            <div>
                <b style="color:${msg.sender_color}; font-size:0.9rem;">${msg.sender_name}</b> <span class="proxy-tag">Proxy</span>
                <div style="color:#333; margin-top:2px; font-size:0.95rem;">${msg.message_text}</div>
            </div>
        `;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendProxyMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value || !currentChatId) return;
        const alter = myAlters.find(a => a.id == document.getElementById('proxy-select').value);

        await _supabase.from('global_messages').insert([{
            conversation_id: currentChatId,
            sender_name: alter.name,
            sender_pfp: alter.pfp,
            sender_color: alter.color,
            message_text: input.value
        }]);
        input.value = '';
    }

    function setupRealtime() {
        _supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'global_messages' }, payload => {
            if (payload.new.conversation_id === currentChatId) {
                renderMessage(payload.new);
                document.getElementById('notif-sound').play().catch(()=>{});
            }
        }).subscribe();
    }

    document.getElementById('msg-input').addEventListener('keypress', e => { if(e.key === 'Enter') sendProxyMessage(); });

    window.onload = init;
</script>
</body>
</html>
