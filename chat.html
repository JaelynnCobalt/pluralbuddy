<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plural Chat - Groups Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; }
        * { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); }
        body { background-color: var(--bg); margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        
        nav { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; }
        .nav-link { padding: 10px 20px; border: 2px solid var(--magenta); background: white; border-radius: 50px; text-decoration: none; font-weight: bold; }

        .discord-container { display: flex; flex: 1; background: white; border: 3px solid var(--magenta); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(255,0,255,0.1); }
        
        .sidebar { width: 280px; background: var(--soft-pink); border-right: 2px solid var(--magenta); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--magenta); background: white; display: flex; justify-content: space-between; align-items: center; }
        .create-btn { background: var(--magenta); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 20px; line-height: 1; }
        
        .list-section { padding: 10px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        .item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,0,255,0.05); transition: 0.2s; display: flex; align-items: center; gap: 10px; text-transform: none; letter-spacing: normal; }
        .item:hover, .item.active { background: white; font-weight: bold; }

        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 15px 20px; border-bottom: 1px solid var(--soft-pink); font-weight: bold; background: #fffafa; }
        #message-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-row { display: flex; gap: 12px; align-items: flex-start; }
        .msg-pfp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid; }
        .proxy-tag { background: var(--magenta); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }

        .input-bar { padding: 20px; border-top: 2px solid var(--magenta); display: flex; gap: 10px; background: white; }
        select, input { padding: 12px; border: 2px solid var(--soft-pink); border-radius: 12px; outline: none; }
        .send-btn { background: var(--magenta); color: white; border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://raw.githubusercontent.com/Anisayari/Discord-Alert-Sound/main/discord_notification.mp3" preload="auto"></audio>

<nav>
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="chat.html" class="nav-link" style="background: var(--magenta); color: white;">Pink Discord</a>
</nav>

<div class="discord-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <span>Conversations</span>
            <button class="create-btn" onclick="createGroup()" title="Create Group Chat">+</button>
        </div>
        <div class="list-section">Direct Messages</div>
        <div id="dm-list"></div>
        <div class="list-section">Group Chats</div>
        <div id="group-list"></div>
    </div>

    <div class="chat-area">
        <div id="chat-header">Select a chat</div>
        <div id="message-list"></div>

        <div class="input-bar">
            <select id="proxy-select"></select>
            <input type="text" id="msg-input" placeholder="Message..." style="flex: 1;">
            <button class="send-btn" onclick="sendProxyMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let activeConvId = null;
    let myAlters = [];

    async function init() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return window.location.href = "index.html";
        currentUser = user;

        // Load Proxy Dropdown
        const { data: profile } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
        myAlters = profile?.system_data?.members || [];
        const select = document.getElementById('proxy-select');
        myAlters.forEach(alt => { select.innerHTML += `<option value="${alt.id}">${alt.name}</option>`; });

        loadSidebar();
        
        _supabase.channel('realtime-chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'global_messages' }, payload => {
            if (payload.new.conversation_id === activeConvId) {
                renderMessage(payload.new);
                if (payload.new.sender_name !== myAlters.find(a => a.id == document.getElementById('proxy-select').value)?.name) {
                    document.getElementById('notif-sound').play().catch(()=>{});
                }
            }
        }).subscribe();
    }

    async function loadSidebar() {
        // Load DMs (Connections)
        const { data: connections } = await _supabase.from('connections').select('friend_id').eq('user_id', currentUser.id);
        const fIds = connections?.map(c => c.friend_id) || [];
        const { data: friends } = await _supabase.from('profiles').select('user_id, username').in('user_id', fIds);
        
        const dmList = document.getElementById('dm-list');
        dmList.innerHTML = '';
        friends?.forEach(f => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `👤 ${f.username}`;
            div.onclick = () => selectChat([currentUser.id, f.user_id].sort().join('_'), f.username, div);
            dmList.appendChild(div);
        });

        // Load Groups (from local storage for now or a 'groups' table if you create one)
        // For this simple version, we'll fetch messages that have a non-ID conversation_id
        const { data: groups } = await _supabase.from('global_messages').select('conversation_id').ilike('conversation_id', 'group_%');
        const uniqueGroups = [...new Set(groups?.map(g => g.conversation_id))];
        
        const groupList = document.getElementById('group-list');
        groupList.innerHTML = '';
        uniqueGroups.forEach(gId => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `💬 ${gId.replace('group_', '').replace(/_/g, ' ')}`;
            div.onclick = () => selectChat(gId, gId.replace('group_', '').replace(/_/g, ' '), div);
            groupList.appendChild(div);
        });
    }

    async function createGroup() {
        const name = prompt("Enter Group Name:");
        const friend1 = prompt("Enter first friend's username:");
        const friend2 = prompt("Enter second friend's username:");
        
        if(!name || !friend1) return;

        // In a real Discord, we'd save the members to a table. 
        // For your prototype, we just start a conversation with a unique "group_" prefix.
        const gId = "group_" + name.replace(/\s+/g, '_');
        selectChat(gId, name);
        alert("Group created! Send a message to start the history.");
    }

    async function selectChat(id, displayName, element) {
        activeConvId = id;
        document.getElementById('chat-header').innerText = displayName;
        document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');

        const { data: msgs } = await _supabase.from('global_messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
        const list = document.getElementById('message-list');
        list.innerHTML = '';
        msgs?.forEach(m => renderMessage(m));
    }

    function renderMessage(msg) {
        const list = document.getElementById('message-list');
        const div = document.createElement('div');
        div.className = 'msg-row';
        div.innerHTML = `
            <img src="${msg.sender_pfp}" class="msg-pfp" style="border-color: ${msg.sender_color}">
            <div>
                <b style="color: ${msg.sender_color}">${msg.sender_name}</b><span class="proxy-tag">Proxy</span>
                <div style="color: #444; margin-top: 2px;">${msg.message_text}</div>
            </div>
        `;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendProxyMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value || !activeConvId) return;

        const alter = myAlters.find(a => a.id == document.getElementById('proxy-select').value);

        await _supabase.from('global_messages').insert([{
            conversation_id: activeConvId,
            sender_name: alter.name,
            sender_pfp: alter.pfp,
            sender_color: alter.color,
            message_text: input.value
        }]);
        input.value = '';
    }

    document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendProxyMessage(); });
    window.onload = init;
</script>
</body>
</html>
