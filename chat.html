<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plural Chat - Groups Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --gray: #f0f0f0; }
        * { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); }
        body { background-color: var(--bg); margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        
        nav { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; }
        .nav-link { padding: 10px 20px; border: 2px solid var(--magenta); background: white; border-radius: 50px; text-decoration: none; font-weight: bold; }

        .discord-container { display: flex; flex: 1; background: white; border: 3px solid var(--magenta); border-radius: 20px; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--soft-pink); border-right: 2px solid var(--magenta); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--magenta); display: flex; justify-content: space-between; align-items: center; background: white; }
        .create-btn { background: var(--magenta); color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; }
        
        #channels-list { flex: 1; overflow-y: auto; }
        .channel-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,0,255,0.1); transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .channel-item:hover, .channel-item.active { background: white; font-weight: bold; }
        .channel-item::before { content: '#'; opacity: 0.5; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid var(--soft-pink); font-weight: bold; font-size: 1.2rem; }
        #message-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fffafa; }
        
        /* Messages */
        .msg-row { display: flex; gap: 12px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        .msg-pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid; object-fit: cover; }
        .proxy-tag { background: var(--magenta); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }

        /* Input */
        .input-bar { padding: 20px; border-top: 2px solid var(--magenta); display: flex; gap: 10px; }
        select, input { padding: 12px; border: 2px solid var(--soft-pink); border-radius: 12px; outline: none; }
        .send-btn { background: var(--magenta); color: white; border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://raw.githubusercontent.com/Anisayari/Discord-Alert-Sound/main/discord_notification.mp3" preload="auto"></audio>

<nav>
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="chat.html" class="nav-link" style="background: var(--magenta); color: white;">Chat Groups</a>
</nav>

<div class="discord-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <span>Groups</span>
            <button class="create-btn" onclick="createNewGroup()">+ New</button>
        </div>
        <div id="channels-list"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="current-room-name">Select a Group</div>
        <div id="message-list"></div>

        <div class="input-bar">
            <select id="proxy-select"></select>
            <input type="text" id="msg-input" placeholder="Message the group..." style="flex: 1;">
            <button class="send-btn" onclick="sendGroupMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let currentGroupId = null;
    let myAlters = [];
    let activeGroups = ['General', 'Vent', 'System-Only']; // Default groups

    async function init() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return window.location.href = "index.html";
        currentUser = user;

        // Load Proxy Menu
        const { data: profile } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
        myAlters = profile?.system_data?.members || [];
        const select = document.getElementById('proxy-select');
        myAlters.forEach(alt => {
            select.innerHTML += `<option value="${alt.id}">${alt.name}</option>`;
        });

        refreshSidebar();
        
        // Realtime
        _supabase.channel('groups').on('postgres_changes', { 
            event: 'INSERT', schema: 'public', table: 'global_messages' 
        }, payload => {
            if (payload.new.conversation_id === currentGroupId) {
                renderMessage(payload.new);
                if (payload.new.sender_name !== document.getElementById('proxy-select').selectedOptions[0].text) {
                    document.getElementById('notif-sound').play().catch(()=>{});
                }
            }
        }).subscribe();
    }

    function refreshSidebar() {
        const list = document.getElementById('channels-list');
        list.innerHTML = '';
        activeGroups.forEach(group => {
            const div = document.createElement('div');
            div.className = 'channel-item' + (currentGroupId === group ? ' active' : '');
            div.innerText = group;
            div.onclick = () => selectGroup(group, div);
            list.appendChild(div);
        });
    }

    function createNewGroup() {
        const name = prompt("Enter Group Name (e.g. 'Art-Club' or 'Secret-Squad'):");
        if (name) {
            const safeName = name.replace(/\s+/g, '-').toLowerCase();
            if (!activeGroups.includes(safeName)) {
                activeGroups.push(safeName);
                refreshSidebar();
                selectGroup(safeName);
            }
        }
    }

    async function selectGroup(groupId) {
        currentGroupId = groupId;
        document.getElementById('current-room-name').innerText = "# " + groupId;
        refreshSidebar();
        
        const { data: msgs } = await _supabase.from('global_messages')
            .select('*')
            .eq('conversation_id', groupId)
            .order('created_at', { ascending: true });

        const list = document.getElementById('message-list');
        list.innerHTML = '';
        if(msgs) msgs.forEach(m => renderMessage(m));
    }

    function renderMessage(msg) {
        const list = document.getElementById('message-list');
        const div = document.createElement('div');
        div.className = 'msg-row';
        div.innerHTML = `
            <img src="${msg.sender_pfp}" class="msg-pfp" style="border-color: ${msg.sender_color}">
            <div>
                <b style="color: ${msg.sender_color}">${msg.sender_name}</b><span class="proxy-tag">Proxy</span>
                <div style="color: #333; margin-top: 4px;">${msg.message_text}</div>
            </div>
        `;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendGroupMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value || !currentGroupId) return;

        const alterId = document.getElementById('proxy-select').value;
        const alter = myAlters.find(a => a.id == alterId);

        await _supabase.from('global_messages').insert([{
            conversation_id: currentGroupId,
            sender_name: alter.name,
            sender_pfp: alter.pfp,
            sender_color: alter.color,
            message_text: input.value
        }]);

        input.value = '';
    }

    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendGroupMessage();
    });

    window.onload = init;
</script>
</body>
</html>
