<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Global Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Reuse your Root and Body styles from the main page */
        :root { --bg: #fff0f6; --magenta: #ff00ff; --soft-pink: #ffdeeb; }
        body { background: var(--bg); font-family: Georgia; padding: 20px; }
        
        #chat-container { max-width: 900px; margin: auto; background: white; height: 80vh; border: 3px solid var(--magenta); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        #message-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 12px; }
        .msg-pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid; }
        .input-area { padding: 20px; background: var(--soft-pink); display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="message-list"></div>
    
    <div class="input-area">
        <select id="speaker-select" style="width: 150px;"></select>
        <input type="text" id="msg-input" placeholder="Say something..." style="flex: 1; padding: 10px; border-radius: 10px; border: none;">
        <button onclick="sendGlobalMessage()" style="background: var(--magenta); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Send</button>
    </div>
</div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let myMembers = [];

    async function initChat() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return alert("Please login on the main page first!");

        // Load your alters for the dropdown
        const { data } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
        if(data?.system_data?.members) {
            myMembers = data.system_data.members;
            const select = document.getElementById('speaker-select');
            myMembers.forEach(m => {
                select.innerHTML += `<option value="${m.id}">${m.name}</option>`;
            });
        }

        loadMessages();
        
        // REAL-TIME: This part listens for new messages from buddies
        _supabase
            .channel('public:global_messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'global_messages' }, payload => {
                renderMessage(payload.new);
            })
            .subscribe();
    }

    async function loadMessages() {
        const { data } = await _supabase.from('global_messages').select('*').order('created_at', { ascending: true }).limit(50);
        data.forEach(msg => renderMessage(msg));
    }

    function renderMessage(msg) {
        const list = document.getElementById('message-list');
        const div = document.createElement('div');
        div.className = 'msg-row';
        div.innerHTML = `
            <img src="${msg.sender_pfp}" class="msg-pfp" style="border-color: ${msg.sender_color}">
            <div>
                <b style="color: ${msg.sender_color}">${msg.sender_name}</b>
                <p style="margin: 5px 0; color: #333;">${msg.message_text}</p>
            </div>
        `;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendGlobalMessage() {
        const input = document.getElementById('msg-input');
        const speakerId = document.getElementById('speaker-select').value;
        const alter = myMembers.find(m => m.id == speakerId);

        if(!input.value || !alter) return;

        await _supabase.from('global_messages').insert([{
            sender_name: alter.name,
            sender_pfp: alter.pfp,
            sender_color: alter.color,
            message_text: input.value,
            channel_slug: 'general'
        }]);

        input.value = '';
    }

    window.onload = initChat;
</script>
</body>
</html>
