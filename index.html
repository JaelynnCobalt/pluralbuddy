<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Master Dashboard</title>
    <style>
        :root {
            --bg: #fff0f6;
            --panel: #ffffff;
            --soft-pink: #ffdeeb;
            --magenta: #ff00ff;
            --front-gold: #fff9c4;
        }

        * { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); }

        body {
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        h1, h2, h3, h4 { color: var(--magenta) !important; }

        #dashboard { width: 100%; max-width: 1300px; }

        nav { margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .tab-btn {
            padding: 10px 20px; border: 2px solid var(--magenta);
            background: white; cursor: pointer; border-radius: 50px; font-weight: bold;
        }

        .tab-btn.active { background: var(--magenta); color: white !important; }

        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }

        section, .card {
            background: var(--panel); padding: 20px; border-radius: 20px;
            border: 2px solid var(--soft-pink); margin-bottom: 20px;
        }

        input, textarea, select {
            width: 100%; padding: 10px; margin: 8px 0;
            border: 1px solid var(--soft-pink); border-radius: 10px;
        }

        .main-btn {
            background: var(--magenta); color: white !important; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; 
        }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }

        /* Profile & Sidekick Cards */
        .profile-card, .sidekick-card { display: flex; flex-direction: column; padding: 20px; }
        .pfp-img { width: 100px; height: 100px; border-radius: 15px; object-fit: cover; border: 3px solid var(--soft-pink); align-self: center; margin-bottom: 10px; }
        .mini-btn { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--soft-pink); cursor: pointer; background: white; font-size: 0.75rem; margin-top: 5px; font-weight: bold;}

        /* Sidekick Styles */
        .sidekick-fronter { display: flex; align-items: center; gap: 10px; background: var(--bg); padding: 8px; border-radius: 12px; margin-top: 8px; border: 1px solid var(--soft-pink); }
        .sk-pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .sync-btn { background: #e3f2fd; color: #1976d2 !important; border: 1px solid #1976d2; }

        /* Fronting Styles */
        .fronting-box { background: var(--front-gold); border: 2px dashed var(--magenta); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .front-card-mini { background: white; padding: 10px; border-radius: 15px; border: 2px solid var(--magenta); display: flex; align-items: center; gap: 10px; margin: 5px;}
        .front-pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="dashboard">
        <nav>
            <button class="tab-btn active" id="btn-overview" onclick="showTab('overview')">Overview</button>
            <button class="tab-btn" id="btn-profiles" onclick="showTab('profiles')">Profiles</button>
            <button class="tab-btn" id="btn-sidekicks" onclick="showTab('sidekicks')">Sidekicks</button>
            <button class="tab-btn" id="btn-history" onclick="showTab('history')">History</button>
        </nav>

        <div id="overview" class="view-section active">
            <section>
                <h1 id="view-sys-name">System Name</h1>
                <p id="view-sys-bio">System Description...</p>
                <button class="main-btn" style="width: auto;" onclick="copySystemID()">📋 Copy My System ID (For Friends)</button>
            </section>

            <div class="fronting-box">
                <h3>Currently Fronting</h3>
                <div id="fronting-display" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
            </div>
        </div>

        <div id="sidekicks" class="view-section">
            <section>
                <h3>📥 Add New Sidekick</h3>
                <textarea id="new-friend-input" placeholder="Paste your friend's ID code here..."></textarea>
                <button class="main-btn" onclick="addFriend()">Add to Gallery</button>
            </section>

            <div id="sidekick-gallery" class="grid-container"></div>
        </div>

        <div id="profiles" class="view-section">
            <section>
                <h2 id="form-title">Manage Alters</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="name" placeholder="Name">
                    <input type="text" id="role" placeholder="Role">
                    <input type="color" id="color" value="#ff00ff">
                    <input type="file" id="pfp" accept="image/*">
                </div>
                <button class="main-btn" onclick="saveAlter()" style="margin-top:10px;">Save Alter</button>
            </section>
            <div id="detailed-profiles-list" class="grid-container"></div>
        </div>

        <div id="history" class="view-section">
            <section>
                <h2>Fronting History</h2>
                <div id="history-log"></div>
            </section>
        </div>
    </div>

    <script>
        let sys = JSON.parse(localStorage.getItem('fullSystemStorage')) || { name: "System Name", bio: "Bio...", members: [], history: [] };
        let sidekicks = JSON.parse(localStorage.getItem('savedSidekicks')) || [];

        window.onload = refresh;

        function showTab(t) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-' + t).classList.add('active');
        }

        // --- SIDEKICK SYNC LOGIC ---
        function copySystemID() {
            const data = {
                name: sys.name,
                fronters: sys.members.filter(m => m.isFronting).map(m => ({ n: m.name, s: m.frontStatus, p: m.pfp })),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };
            navigator.clipboard.writeText(btoa(JSON.stringify(data)));
            alert("✨ ID Copied! Send it to your friend.");
        }

        function addFriend() {
            const val = document.getElementById('new-friend-input').value.trim();
            if (processID(val)) {
                document.getElementById('new-friend-input').value = "";
                refresh();
            }
        }

        function syncFriend(index) {
            const val = prompt("Paste your friend's NEW ID code here to refresh their status:");
            if (val && processID(val)) {
                refresh();
            }
        }

        function processID(code) {
            try {
                const data = JSON.parse(atob(code));
                const idx = sidekicks.findIndex(s => s.name === data.name);
                if (idx > -1) sidekicks[idx] = data;
                else sidekicks.push(data);
                localStorage.setItem('savedSidekicks', JSON.stringify(sidekicks));
                return true;
            } catch (e) { alert("Invalid Code!"); return false; }
        }

        // --- REFRESH UI ---
        function refresh() {
            localStorage.setItem('fullSystemStorage', JSON.stringify(sys));
            document.getElementById('view-sys-name').innerText = sys.name;

            const frontD = document.getElementById('fronting-display');
            const profL = document.getElementById('detailed-profiles-list');
            const skGal = document.getElementById('sidekick-gallery');

            frontD.innerHTML = ''; profL.innerHTML = ''; skGal.innerHTML = '';

            // Members
            sys.members.forEach(m => {
                if(m.isFronting) {
                    frontD.innerHTML += `<div class="front-card-mini" style="border-color:${m.color}; color:${m.color}">
                        <img src="${m.pfp}" class="front-pfp">
                        <b>${m.name}</b>
                    </div>`;
                }
                profL.innerHTML += `<div class="card profile-card" style="border-top: 5px solid ${m.color}">
                    <img src="${m.pfp}" class="pfp-img">
                    <h3>${m.name}</h3>
                    <button class="mini-btn" onclick="toggleFront(${m.id})">${m.isFronting ? 'Leave Front' : 'Front'}</button>
                </div>`;
            });

            // Sidekicks
            sidekicks.forEach((sk, i) => {
                let skFronters = sk.fronters.map(f => `
                    <div class="sidekick-fronter">
                        <img src="${f.p}" class="sk-pfp">
                        <div><b>${f.n}</b><br><small>${f.s}</small></div>
                    </div>
                `).join('');
                skGal.innerHTML += `<div class="card sidekick-card">
                    <h3 style="margin:0;">${sk.name}</h3>
                    <small style="opacity:0.5;">Last Update: ${sk.time}</small>
                    <div style="margin: 10px 0;">${skFronters || 'No one fronting'}</div>
                    <button class="mini-btn sync-btn" onclick="syncFriend(${i})">🔄 Sync Update</button>
                    <button class="mini-btn" style="color:red; border-color:red;" onclick="deleteFriend(${i})">Remove</button>
                </div>`;
            });
        }

        function deleteFriend(i) { if(confirm("Remove?")) { sidekicks.splice(i, 1); localStorage.setItem('savedSidekicks', JSON.stringify(sidekicks)); refresh(); } }

        function toggleFront(id) {
            const m = sys.members.find(x=>x.id==id);
            if(!m.isFronting) {
                const s = prompt("Status?", "Fronting");
                if(s) { m.isFronting=true; m.frontStatus=s; }
            } else { m.isFronting=false; }
            refresh();
        }

        function saveAlter() {
            const pfpF = document.getElementById('pfp').files[0];
            const reader = new FileReader();
            const name = document.getElementById('name').value || "Unnamed";
            const color = document.getElementById('color').value;

            const pushAlter = (img) => {
                sys.members.push({ id: Date.now(), name, color, pfp: img || "https://via.placeholder.com/100", isFronting: false });
                refresh();
            };

            if(pfpF) {
                reader.readAsDataURL(pfpF);
                reader.onload = () => pushAlter(reader.result);
            } else pushAlter();
        }
    </script>
</body>
</html>
