<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Master Dashboard</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --front-gold: #fff9c4; }
        * { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); }
        body { background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1, h2, h3, h4, th { color: var(--magenta) !important; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; width: 100%; }
        .auth-card { background: white; padding: 40px; border-radius: 30px; border: 3px solid var(--magenta); text-align: center; max-width: 400px; width: 100%; }
        #dashboard { display: none; width: 100%; max-width: 1300px; }
        nav { margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: 2px solid var(--magenta); background: white; cursor: pointer; border-radius: 50px; font-weight: bold; }
        .tab-btn.active { background: var(--magenta); color: white !important; }
        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }
        section, .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 2px solid var(--soft-pink); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 10px; }
        .main-btn { background: var(--magenta); color: white !important; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .profile-card, .sidekick-card { display: flex; flex-direction: column; padding: 20px; }
        .pfp-img { width: 100px; height: 100px; border-radius: 15px; object-fit: cover; border: 3px solid var(--soft-pink); align-self: center; margin-bottom: 10px; }
        .mini-btn { width: 100%; padding: 6px; border-radius: 8px; border: 1px solid var(--soft-pink); cursor: pointer; background: white; font-size: 0.75rem; margin-top: 5px;}
        .fronting-box { background: var(--front-gold); border: 2px dashed var(--magenta); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .front-card-mini { background: white; padding: 10px; border-radius: 15px; border: 2px solid var(--magenta); display: flex; align-items: center; gap: 10px; position: relative; margin: 5px;}
        .front-pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid currentColor; }
        .sk-fronter-row { display: flex; align-items: center; gap: 10px; background: var(--bg); padding: 8px; border-radius: 10px; margin-top: 5px; border: 1px solid var(--soft-pink); }
        .sk-pfp-sm { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .sync-card { background: #fdf2f8; border: 2px solid var(--magenta); border-style: dotted; text-align: center; }
        @media (max-width: 1100px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>System Entry</h1>
            <input type="password" id="passcode-input" placeholder="Passcode...">
            <button class="main-btn" onclick="handleAuth()">Login</button>
            <p id="switch-auth" style="font-size: 0.8rem; margin-top: 15px; cursor: pointer;" onclick="toggleAuthMode()">Register</p>
        </div>
    </div>

    <div id="dashboard">
        <nav>
            <button class="tab-btn active" id="btn-overview" onclick="showTab('overview')">Overview</button>
            <button class="tab-btn" id="btn-profiles" onclick="showTab('profiles')">Profiles</button>
            <button class="tab-btn" id="btn-sidekicks" onclick="showTab('sidekicks')">Sidekicks</button>
            <button class="tab-btn" onclick="logout()">Logout</button>
        </nav>

        <div id="overview" class="view-section active">
            <section>
                <h1 id="view-sys-name">System Name</h1>
                <p id="view-sys-bio">Description...</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="edit-sys-name" placeholder="Name">
                    <input type="text" id="edit-sys-bio" placeholder="Bio">
                    <button class="main-btn" onclick="updateSystemInfo()" style="width: 100px;">Save</button>
                </div>
            </section>
            <div class="fronting-box">
                <h3>Currently Fronting</h3>
                <div id="fronting-display" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;">No one is fronting.</div>
            </div>
            <h3>Directory</h3>
            <div id="overview-list"></div>
        </div>

        <div id="sidekicks" class="view-section">
            <section class="sync-card">
                <h3>System ID & Syncing</h3>
                <p style="font-size: 0.8rem;">Enter your "Username" and Broadcast to stay updated!</p>
                <input type="text" id="my-sync-channel" placeholder="Your Sync Channel Name...">
                <button class="main-btn" style="width: auto; padding: 10px 25px;" onclick="copySystemID()">📡 Manual Broadcast & Copy ID</button>
            </section>
            <section>
                <h3>Add a Sidekick</h3>
                <input type="text" id="friend-channel-input" placeholder="Paste friend's Sync Channel or ID...">
                <button class="main-btn" onclick="addSidekick()">Add Sidekick</button>
            </section>
            <h2>Sidekick Gallery</h2>
            <div id="sidekick-list" class="grid-container"></div>
        </div>

        <div id="profiles" class="view-section">
            <section>
                <h2>Manage Alters</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="name" placeholder="Name">
                    <input type="text" id="pronouns" placeholder="Pronouns">
                    <input type="text" id="role" placeholder="Role">
                    <div><label style="font-size: 0.7rem;">Color:</label><input type="color" id="color" value="#ff00ff"></div>
                    <textarea id="bio" placeholder="Bio..." style="grid-column: span 2; height: 80px;"></textarea>
                    <input type="file" id="pfp" accept="image/*" style="grid-column: span 2;">
                </div>
                <button class="main-btn" onclick="saveAlter()" style="margin-top:10px;">Save Alter</button>
            </section>
            <div id="detailed-profiles-list" class="grid-container"></div>
        </div>
    </div>

    <script>
        const pubnub = new PubNub({
            publishKey: 'pub-c-49033f92-c286-4f40-848e-ef86903366c8',
            subscribeKey: 'sub-c-10336714-386d-4950-9d04-1c6670a48530',
            userId: "user-" + Math.random()
        });

        let isReg = false;
        let sys = JSON.parse(localStorage.getItem('fullSystemStorage')) || { name: "System Name", bio: "Bio...", members: [], syncChannel: "" };
        let sidekicks = JSON.parse(localStorage.getItem('sidekickList')) || [];

        function handleAuth() { 
            const p = document.getElementById('passcode-input').value;
            if(isReg) { localStorage.setItem('system_passcode', p); login(); }
            else if(p === localStorage.getItem('system_passcode')) login(); else alert("Denied");
        }
        function toggleAuthMode() { isReg = !isReg; document.getElementById('switch-auth').innerText = isReg ? "Login" : "Register"; }
        function login() { document.getElementById('auth-screen').style.display='none'; document.getElementById('dashboard').style.display='block'; refresh(); autoSyncAll(); }
        function logout() { location.reload(); }

        function broadcastLive() {
            if(!sys.syncChannel) return;
            const activeData = { 
                name: sys.name, 
                fronters: sys.members.filter(m => m.isFronting).map(m => ({ n: m.name, p: m.pfp, s: m.frontStatus || "Fronting" })), 
                updated: new Date().toLocaleTimeString() 
            };
            pubnub.publish({ channel: sys.syncChannel, message: activeData });
        }

        function copySystemID() {
            sys.syncChannel = document.getElementById('my-sync-channel').value.trim();
            if(!sys.syncChannel) return alert("Enter a Channel Name!");
            broadcastLive();
            navigator.clipboard.writeText(btoa(JSON.stringify({ channel: sys.syncChannel }))).then(() => alert("📡 Broadcast Live & ID Copied!"));
            refresh();
        }

        function addSidekick() {
            let chan = document.getElementById('friend-channel-input').value.trim();
            try { chan = JSON.parse(atob(chan)).channel; } catch(e) {}
            if(chan && !sidekicks.find(s => s.channel === chan)) {
                sidekicks.push({ channel: chan, name: "Loading...", fronters: [] });
                localStorage.setItem('sidekickList', JSON.stringify(sidekicks));
                refreshSidekick(chan, sidekicks.length - 1);
            }
        }

        function refreshSidekick(chan, index) {
            pubnub.history({ channel: chan, count: 1 }, (status, response) => {
                if (response && response.messages.length) {
                    const data = response.messages[0].entry;
                    sidekicks[index].name = data.name;
                    sidekicks[index].fronters = data.fronters;
                    sidekicks[index].lastSync = data.updated;
                    localStorage.setItem('sidekickList', JSON.stringify(sidekicks));
                    refresh();
                }
            });
        }

        function autoSyncAll() { sidekicks.forEach((sk, i) => refreshSidekick(sk.channel, i)); }

        function refresh() {
            localStorage.setItem('fullSystemStorage', JSON.stringify(sys));
            document.getElementById('view-sys-name').innerText = sys.name;
            document.getElementById('my-sync-channel').value = sys.syncChannel || "";
            const frontD = document.getElementById('fronting-display');
            const profL = document.getElementById('detailed-profiles-list');
            const overL = document.getElementById('overview-list');
            const skList = document.getElementById('sidekick-list');
            frontD.innerHTML=''; profL.innerHTML=''; skList.innerHTML=''; overL.innerHTML='';

            sys.members.forEach(m => {
                if(m.isFronting) frontD.innerHTML += `<div class="front-card-mini" style="color:${m.color}"><img src="${m.pfp}" class="front-pfp"><b>${m.name}</b></div>`;
                profL.innerHTML += `<div class="card profile-card" style="border-top:8px solid ${m.color}"><h3>${m.name}</h3><button class="mini-btn" onclick="toggleFront(${m.id})">${m.isFronting?'Leave':'Front'}</button></div>`;
                overL.innerHTML += `<div class="card" style="border-left: 10px solid ${m.color}">${m.name}</div>`;
            });

            sidekicks.forEach((sk, i) => {
                let skF = sk.fronters.map(f => `<div class="sk-fronter-row"><img src="${f.p}" class="sk-pfp-sm"><b>${f.n}</b></div>`).join('');
                skList.innerHTML += `<div class="card sidekick-card"><h3>${sk.name}</h3><div style="margin:10px 0;">${skF || 'No data yet.'}</div><button class="mini-btn" onclick="refreshSidekick('${sk.channel}', ${i})">🔄 Refresh</button></div>`;
            });
        }

        function toggleFront(id) { 
            const m = sys.members.find(x=>x.id==id); 
            m.isFronting = !m.isFronting;
            refresh(); 
            broadcastLive(); // AUTO-BROADCAST
        }

        function saveAlter() {
            const m = { id: Date.now(), name: document.getElementById('name').value, color: document.getElementById('color').value, pfp: "https://via.placeholder.com/150", isFronting: false };
            sys.members.push(m); refresh();
        }

        function updateSystemInfo() {
            sys.name = document.getElementById('edit-sys-name').value || sys.name;
            sys.bio = document.getElementById('edit-sys-bio').value || sys.bio;
            refresh();
            broadcastLive();
        }

        function showTab(t) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(t).classList.add('active');
        }
    </script>
</body>
</html>
