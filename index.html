<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard: Live Sidekicks</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --magenta: #ff00ff; --soft-pink: #ffdeeb; --gold: #fff9c4; }
        * { box-sizing: border-box; font-family: 'Georgia', serif; color: var(--magenta); }
        body { background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #dashboard { width: 100%; max-width: 900px; }
        
        nav { margin-bottom: 25px; display: flex; gap: 10px; justify-content: center; }
        .tab-btn { padding: 12px 25px; border: 2px solid var(--magenta); background: white; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--magenta); color: white; }

        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }

        section, .card { background: white; padding: 25px; border-radius: 20px; border: 2px solid var(--soft-pink); margin-bottom: 20px; box-shadow: 0 4px 10px rgba(255,0,255,0.05); }
        
        .main-btn { background: var(--magenta); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
        .sync-btn { background: #f0f4ff; color: #4a90e2; border: 1px solid #4a90e2; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--soft-pink); border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        
        .fronter-strip { display: flex; align-items: center; gap: 12px; background: var(--bg); padding: 10px; border-radius: 15px; margin-top: 10px; border: 1px solid var(--soft-pink); }
        .pfp-mini { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        
        .id-box { background: var(--gold); border: 2px dashed var(--magenta); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="dashboard">
    <nav>
        <button class="tab-btn active" onclick="showTab('home')">Fronting</button>
        <button class="tab-btn" onclick="showTab('sidekicks')">Sidekicks</button>
        <button class="tab-btn" onclick="showTab('settings')">Settings</button>
    </nav>

    <div id="home" class="view-section active">
        <section style="text-align: center;">
            <h1 id="disp-sys-name">My System</h1>
            <div id="my-fronters-list" class="grid"></div>
            <p style="font-size: 0.9rem; opacity: 0.7;">Make sure to click "Broadcast" after changing fronts!</p>
            <button class="main-btn" onclick="broadcastFront()">✨ Broadcast My Fronting Status</button>
        </section>
    </div>

    <div id="sidekicks" class="view-section">
        <div class="id-box">
            <h3 style="margin-top:0;">Your System ID</h3>
            <p>Share this "Channel Name" with friends so they can add you:</p>
            <strong id="my-channel-id-display" style="font-size: 1.2rem; letter-spacing: 1px;">(Set in Settings)</strong>
        </div>

        <section>
            <h3>Add a Friend</h3>
            <input type="text" id="add-friend-input" placeholder="Enter friend's Channel Name...">
            <button class="main-btn" onclick="addSidekick()">Add to Sidekicks</button>
        </section>

        <div id="sidekick-gallery" class="grid"></div>
    </div>

    <div id="settings" class="view-section">
        <section>
            <h3>Profile Setup</h3>
            <label>System Name:</label>
            <input type="text" id="set-sys-name" placeholder="The Star Garden">
            
            <label>Secret Sync Channel Name (Your "ID"):</label>
            <p style="font-size: 0.7rem;">Create a unique name (e.g., star-garden-99). No spaces!</p>
            <input type="text" id="set-channel-id" placeholder="unique-name-123">
            
            <button class="main-btn" onclick="saveSettings()">Save & Initialize</button>
        </section>
    </div>
</div>

<script>
    const pubnub = new PubNub({
        publishKey: 'pub-c-49033f92-c286-4f40-848e-ef86903366c8',
        subscribeKey: 'sub-c-10336714-386d-4950-9d04-1c6670a48530',
        userId: "user-" + Math.random()
    });

    let sysData = JSON.parse(localStorage.getItem('sysLive')) || { name: "System Name", channel: "", members: [] };
    let sidekicks = JSON.parse(localStorage.getItem('skLive')) || [];

    function showTab(t) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        event.target.classList.add('active');
    }

    function saveSettings() {
        sysData.name = document.getElementById('set-sys-name').value;
        sysData.channel = document.getElementById('set-channel-id').value.trim().toLowerCase();
        localStorage.setItem('sysLive', JSON.stringify(sysData));
        alert("Settings Saved!");
        refreshUI();
    }

    function broadcastFront() {
        if(!sysData.channel) return alert("Set your Channel ID in Settings first!");
        const payload = {
            name: sysData.name,
            fronters: sysData.members.filter(m => m.isFronting).map(m => ({n: m.name, p: m.pfp})),
            updated: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        };
        pubnub.publish({ channel: sysData.channel, message: payload });
        alert("Status Broadcasted!");
    }

    function addSidekick() {
        const chan = document.getElementById('add-friend-input').value.trim().toLowerCase();
        if(chan && !sidekicks.find(s => s.channel === chan)) {
            sidekicks.push({ channel: chan, name: "Loading...", fronters: [], lastUpdate: "Never" });
            localStorage.setItem('skLive', JSON.stringify(sidekicks));
            refreshUI();
            refreshFriendStatus(chan);
        }
    }

    function refreshFriendStatus(chan) {
        pubnub.history({ channel: chan, count: 1 }, (status, response) => {
            if (response && response.messages.length) {
                const data = response.messages[0].entry;
                const idx = sidekicks.findIndex(s => s.channel === chan);
                if(idx > -1) {
                    sidekicks[idx].name = data.name;
                    sidekicks[idx].fronters = data.fronters;
                    sidekicks[idx].lastUpdate = data.updated;
                    localStorage.setItem('skLive', JSON.stringify(sidekicks));
                    refreshUI();
                }
            } else {
                alert("No data found for this channel. Ask your friend to 'Broadcast' first!");
            }
        });
    }

    function refreshUI() {
        document.getElementById('disp-sys-name').innerText = sysData.name;
        document.getElementById('my-channel-id-display').innerText = sysData.channel || "(Go to Settings)";
        
        const gallery = document.getElementById('sidekick-gallery');
        gallery.innerHTML = '';
        
        sidekicks.forEach(sk => {
            let frontersHtml = sk.fronters.length > 0 
                ? sk.fronters.map(f => `<div class="fronter-strip"><img src="${f.p}" class="pfp-mini"><b>${f.n}</b></div>`).join('')
                : "<p>Nobody is fronting</p>";

            gallery.innerHTML += `
                <div class="card">
                    <h3 style="margin:0;">${sk.name}</h3>
                    <small>Last seen: ${sk.lastUpdate}</small>
                    <div style="margin:15px 0;">${frontersHtml}</div>
                    <button class="sync-btn" onclick="refreshFriendStatus('${sk.channel}')">🔄 Refresh Now</button>
                </div>
            `;
        });
    }

    refreshUI();
</script>
</body>
</html>
