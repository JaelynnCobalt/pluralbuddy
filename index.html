<style>
/* ... existing styles ... */

/* UPDATED HISTORY STYLES */
.history-group { 
    border-left: 5px solid var(--magenta);  
    background: #fff; 
    margin-bottom: 15px; 
    padding: 5px 0;
    border-radius: 0 15px 15px 0;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.03);
}
.history-entry { 
    padding: 6px 15px; 
    display: flex; 
    align-items: center; 
    gap: 15px;
    font-size: 0.85rem; 
    border-bottom: 1px solid #fff0f6;
}
.history-entry:last-child { border-bottom: none; }
.hist-name { font-weight: bold; min-width: 80px; }
.hist-status { font-style: italic; opacity: 0.8; flex-grow: 1; }
.hist-time { font-family: monospace; font-size: 0.8rem; opacity: 0.7; white-space: nowrap; }

/* ... rest of existing styles ... */
</style>

<script>
// ... existing logic ...

function refreshUI() {
    document.getElementById('view-sys-name').innerText = systemData.name;
    document.getElementById('view-sys-bio').innerText = systemData.bio;
    
    const frontDisplay = document.getElementById('fronting-display');
    const overviewList = document.getElementById('overview-list');
    const detailedList = document.getElementById('detailed-profiles-list');
    const historyContainer = document.getElementById('history-container');
    
    frontDisplay.innerHTML = ''; overviewList.innerHTML = ''; detailedList.innerHTML = ''; historyContainer.innerHTML = '';

    // Render Members
    systemData.members.forEach(m => {
        if(m.isFronting) {
            frontDisplay.innerHTML += `
                <div class="front-card-mini" style="border-color:${m.color}; color:${m.color}">
                    <img src="${m.pfp}" style="width:45px;height:45px;border-radius:10px;object-fit:cover;">
                    <div><b>${m.name}</b><br><small style="color:gray; font-style:italic;">${m.currentStatus}</small></div>
                    <button class="remove-front-btn" style="border-color:${m.color}; color:${m.color}" onclick="toggleFront(${m.id})">×</button>
                </div>`;
        }
        
        overviewList.innerHTML += `
            <div class="card directory-card" style="border-color:${m.color}">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div style="width:12px;height:12px;border-radius:50%;background:${m.isFronting ? '#00ff00' : '#ccc'}"></div>
                    <strong style="color:${m.color}">${m.name}</strong> <small>— ${m.role}</small>
                </div>
                <button class="mini-btn" style="width:100px; margin:0;" onclick="toggleFront(${m.id})">${m.isFronting ? 'Exit' : 'Front'}</button>
            </div>`;

        detailedList.innerHTML += `
            <div class="card profile-card" style="border-color:${m.color}">
                <img src="${m.pfp}" class="pfp-img" style="border-color:${m.color}">
                <h2 style="text-align:center; margin:0; color:${m.color} !important;">${m.name}</h2>
                <span class="detail-label">Role</span><p class="detail-text">${m.role}</p>
                <span class="detail-label">Bio</span><p class="detail-text">${m.bio}</p>
                <div style="margin-top:auto; padding-top:15px; display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button class="mini-btn" onclick="toggleFront(${m.id})">${m.isFronting ? 'Leave' : 'Front'}</button>
                    <button class="mini-btn" onclick="editAlter(${m.id})">Edit</button>
                    <button class="mini-btn" style="grid-column:span 2; color:red; border-color:red" onclick="deleteAlter(${m.id})">Delete</button>
                </div>
            </div>`;
    });

    // Render History with Colors and Compact Layout
    let currentGroupHtml = "";
    systemData.history.forEach((entry, index) => {
        const nextEntry = systemData.history[index + 1];
        
        // Find the color from systemData.members (fallback to magenta if member was deleted)
        const memberMatch = systemData.members.find(m => m.name === entry.name);
        const entryColor = memberMatch ? memberMatch.color : 'var(--magenta)';

        const html = `
            <div class="history-entry" style="border-left: 3px solid ${entryColor}">
                <span class="hist-name" style="color:${entryColor}">${entry.name}</span>
                <span class="hist-status">"${entry.status}"</span>
                <span class="hist-time">${entry.start} - ${entry.end} (${entry.duration}m)</span>
            </div>`;
        
        currentGroupHtml += html;

        // Grouping: If the next entry is more than 3 minutes away (180,000ms), end the group
        if (!nextEntry || (entry.timestamp - nextEntry.timestamp > 180000)) {
            historyContainer.innerHTML += `<div class="history-group">${currentGroupHtml}</div>`;
            currentGroupHtml = "";
        }
    });
}
// ... rest of existing script ...
</script>
