<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Master Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
--bg: #fff0f6;
--panel: #ffffff;
--soft-pink: #ffdeeb;
--magenta: #ff00ff;
--front-gold: #fff9c4;
}

* { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); }
body { background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
h1, h2, h3, h4 { color: var(--magenta) !important; }

/* LAYOUT & NAV */
#dashboard { display: none; width: 100%; max-width: 1100px; }
nav { margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.tab-btn { padding: 10px 20px; border: 2px solid var(--magenta); background: white; cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
.tab-btn.active { background: var(--magenta); color: white !important; }

/* SECTIONS & CARDS */
.view-section { display: none; width: 100%; }
.view-section.active { display: block; }
section, .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 2px solid var(--soft-pink); box-shadow: 0 10px 25px rgba(255, 0, 255, 0.05); margin-bottom: 20px; }
input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 10px; background: white; }
.main-btn { background: var(--magenta); color: white !important; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1rem; }

/* PROFILE GRID STYLES */
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.profile-card { display: flex; flex-direction: column; padding: 20px; height: 100%; position: relative; }
.pfp-img { width: 120px; height: 120px; border-radius: 15px; object-fit: cover; border: 3px solid var(--soft-pink); align-self: center; margin-bottom: 15px; }
.detail-label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-top: 10px; display: block; opacity: 0.7; }
.detail-text { font-size: 0.95rem; margin: 0; word-wrap: break-word; font-weight: bold; white-space: pre-wrap; }
.mini-btn { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--soft-pink); cursor: pointer; background: white; font-size: 0.8rem; margin-top: 5px; font-weight: bold; }

/* FLOATING CHAT BUTTON */
.floating-chat-link { position: fixed; bottom: 30px; right: 30px; background: var(--magenta); color: white !important; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(255, 0, 255, 0.3); z-index: 10001; transition: 0.3s; }
.floating-chat-link:hover { transform: scale(1.05); }

/* OVERLAY */
#profile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 246, 0.98); z-index: 9999; overflow-y: auto; padding: 20px; }
.overlay-content { max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 30px; border: 3px solid var(--magenta); position: relative; }
.close-overlay { position: absolute; top: 20px; right: 25px; font-size: 40px; cursor: pointer; color: var(--magenta); }

/* MISC */
.fronting-box { background: var(--front-gold); border: 2px dashed var(--magenta); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
.front-card-mini { background: white; padding: 10px; border-radius: 15px; border: 2px solid var(--magenta); display: flex; align-items: center; gap: 10px; }
#toast { visibility: hidden; min-width: 250px; background-color: var(--magenta); color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 1000; bottom: 30px; }
#toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
@keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
@keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
</style>
</head>
<body>

<div id="toast">Synced to Cloud! ✨</div>

<div id="profile-overlay">
    <div class="overlay-content">
        <span class="close-overlay" onclick="closeOverlay()">&times;</span>
        <div id="overlay-body"></div>
        <a href="chat.html" class="floating-chat-link">💬 Open Global Chat</a>
    </div>
</div>

<div id="auth-screen">
    <section style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h1>System Entry</h1>
        <input type="email" id="email-input" placeholder="Email">
        <input type="password" id="passcode-input" placeholder="Password">
        <button class="main-btn" onclick="handleAuth()">Login / Register</button>
    </section>
</div>

<div id="dashboard">
    <nav>
        <button class="tab-btn active" id="btn-overview" onclick="showTab('overview')">Overview</button>
        <button class="tab-btn" id="btn-profiles" onclick="showTab('profiles')">Profiles</button>
        <button class="tab-btn" id="btn-sidekicks" onclick="showTab('sidekicks')">Sidekicks</button>
        <button class="tab-btn" id="btn-chat" onclick="showTab('chat')">Internal Chat</button>
        <button class="tab-btn" style="border-color: #aaa; color: #aaa;" onclick="logout()">Logout</button>
    </nav>

    <div id="overview" class="view-section active">
        <section>
            <h1 id="view-sys-name">System Name</h1>
            <p id="view-sys-bio">Description...</p>
            <input type="text" id="edit-username" placeholder="Unique Username" style="width: 200px;">
            <button class="mini-btn" onclick="updateUsername()" style="width: 100px;">Set Username</button>
        </section>
        <div class="fronting-box">
            <h3>Currently Fronting</h3>
            <div id="fronting-display" style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px;"></div>
        </div>
        <div id="overview-list"></div>
    </div>

    <div id="profiles" class="view-section">
        <section>
            <h2 id="form-title">Manage Alters</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="hidden" id="edit-id">
                <input type="text" id="name" placeholder="Name">
                <input type="text" id="pronouns" placeholder="Pronouns">
                <input type="text" id="role" placeholder="Role">
                <input type="text" id="fandoms" placeholder="Fandoms">
                <div style="grid-column: span 2;">
                    <label style="font-size: 0.7rem; font-weight:bold;">Theme Color:</label>
                    <input type="color" id="color" value="#ff00ff">
                </div>
                <textarea id="bio" placeholder="Bio/Description..." style="grid-column: span 2; height: 100px;"></textarea>
                <input type="file" id="pfp" accept="image/*" style="grid-column: span 2;">
            </div>
            <button class="main-btn" onclick="saveAlter()" style="margin-top:10px;">Save Alter Profile</button>
            <button class="mini-btn" id="cancel-edit" style="display:none;" onclick="clearForm()">Cancel Edit</button>
        </section>
        <div id="detailed-profiles-list" class="grid-container"></div>
    </div>

    <div id="sidekicks" class="view-section">
        <section>
            <h3>Add a Buddy</h3>
            <input type="text" id="sidekick-search" placeholder="Enter username...">
            <button class="main-btn" onclick="addSidekick()">Add Buddy</button>
        </section>
        <div id="sidekicks-list"></div>
    </div>

    <div id="chat" class="view-section">
        <section><h2>Internal System Chat</h2><p>Coming soon...</p></section>
    </div>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let systemData = { name: "System Name", bio: "Bio...", members: [] };

async function handleAuth() {
    const email = document.getElementById('email-input').value;
    const password = document.getElementById('passcode-input').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) await _supabase.auth.signUp({ email, password });
    location.reload();
}

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    const { data } = await _supabase.from('profiles').select('*').eq('user_id', user.id).single();
    if (data?.system_data) systemData = data.system_data;
    if (data?.username) document.getElementById('edit-username').value = data.username;
    refreshUI();
}

async function sync() {
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').upsert({ user_id: user.id, system_data: systemData });
    showToast();
}

function saveAlter() {
    const id = document.getElementById('edit-id').value;
    const finalize = (imgBase64) => {
        const member = {
            id: id ? parseInt(id) : Date.now(),
            name: document.getElementById('name').value || "Unnamed",
            pronouns: document.getElementById('pronouns').value || "",
            role: document.getElementById('role').value || "",
            fandoms: document.getElementById('fandoms').value || "",
            color: document.getElementById('color').value,
            bio: document.getElementById('bio').value || "",
            pfp: imgBase64 || (id ? systemData.members.find(m => m.id == id).pfp : "https://via.placeholder.com/150"),
            isFronting: id ? systemData.members.find(m => m.id == id).isFronting : false
        };
        if (id) {
            const idx = systemData.members.findIndex(m => m.id == id);
            systemData.members[idx] = member;
        } else {
            systemData.members.push(member);
        }
        sync(); refreshUI(); clearForm();
    };

    const file = document.getElementById('pfp').files[0];
    if (file) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => finalize(reader.result);
    } else finalize();
}

function refreshUI() {
    const list = document.getElementById('detailed-profiles-list');
    const frontDisplay = document.getElementById('fronting-display');
    list.innerHTML = ''; frontDisplay.innerHTML = '';

    systemData.members.forEach(m => {
        if(m.isFronting) {
            frontDisplay.innerHTML += `<div class="front-card-mini" style="border-color:${m.color}"><img src="${m.pfp}" style="width:40px;height:40px;border-radius:50%;"><b>${m.name}</b></div>`;
        }
        list.innerHTML += `
            <div class="card profile-card" style="border-top: 10px solid ${m.color}">
                <img src="${m.pfp}" class="pfp-img" style="border-color:${m.color}">
                <h2 style="text-align:center; margin:0; color:${m.color} !important;">${m.name}</h2>
                <span class="detail-label">Pronouns</span><p class="detail-text">${m.pronouns}</p>
                <span class="detail-label">Role</span><p class="detail-text">${m.role}</p>
                <span class="detail-label">Fandoms</span><p class="detail-text">${m.fandoms}</p>
                <span class="detail-label">Bio</span><p class="detail-text">${m.bio}</p>
                <div style="margin-top:auto;">
                    <button class="mini-btn" onclick="toggleFront(${m.id})">${m.isFronting ? 'Leave Front' : 'Front'}</button>
                    <button class="mini-btn" onclick="editAlter(${m.id})">Edit</button>
                </div>
            </div>`;
    });
}

function toggleFront(id) {
    const m = systemData.members.find(m => m.id == id);
    m.isFronting = !m.isFronting;
    refreshUI(); sync();
}

function editAlter(id) {
    const m = systemData.members.find(m => m.id == id);
    document.getElementById('edit-id').value = m.id;
    document.getElementById('name').value = m.name;
    document.getElementById('pronouns').value = m.pronouns;
    document.getElementById('role').value = m.role;
    document.getElementById('fandoms').value = m.fandoms;
    document.getElementById('color').value = m.color;
    document.getElementById('bio').value = m.bio;
    document.getElementById('form-title').innerText = "Editing: " + m.name;
    document.getElementById('cancel-edit').style.display = 'block';
    showTab('profiles');
}

function clearForm() {
    document.getElementById('edit-id').value = '';
    document.getElementById('form-title').innerText = "Manage Alters";
    document.getElementById('cancel-edit').style.display = 'none';
    document.querySelectorAll('#profiles input, #profiles textarea').forEach(i => i.value = '');
}

function showTab(id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('btn-'+id).classList.add('active');
}

function showToast() { const t = document.getElementById('toast'); t.className = 'show'; setTimeout(() => t.className = '', 3000); }
function logout() { _supabase.auth.signOut(); location.reload(); }

window.onload = loadData;
</script>
</body>
</html>
