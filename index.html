<script>
    // --- SUPABASE CONFIGURATION ---
    // Using your project-specific URL and your Publishable key
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co'; 
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let isRegisterMode = false;
    let systemData = {
        name: "System Name", bio: "Description...", members: [], history: [],
        channels: { "general": [], "trigger-warning": [], "adult-general": [] }, 
        activeChannel: "general"
    };

    function toggleAuthMode() { 
        isRegisterMode = !isRegisterMode; 
        document.getElementById('auth-title').innerText = isRegisterMode ? "System Registration" : "System Entry";
        document.getElementById('auth-desc').innerText = isRegisterMode ? "Create a new multi-device account." : "Please login to access your system.";
        document.getElementById('auth-btn').innerText = isRegisterMode ? "Register" : "Login";
        document.getElementById('switch-auth').innerText = isRegisterMode ? "Already have an account? Login" : "No account? Register"; 
    }

    async function handleAuth() { 
        const email = document.getElementById('email-input').value;
        const pass = document.getElementById('passcode-input').value;

        if(!email || !pass) return alert("Please fill in both fields");

        if(isRegisterMode) { 
            const { error } = await _supabase.auth.signUp({ email, password: pass });
            if(error) alert(error.message);
            else alert("Success! You can now log in.");
        } else { 
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            if(error) alert(error.message);
            else {
                await loadSystemData();
                loginSuccess();
            }
        }
    }

    function loginSuccess() { 
        document.getElementById('auth-screen').style.display = 'none'; 
        document.getElementById('dashboard').style.display = 'block'; 
        refreshUI(); 
    }

    async function logout() { 
        await _supabase.auth.signOut();
        location.reload(); 
    }

    // --- CLOUD SYNC LOGIC ---

    async function loadSystemData() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) return;

        const { data, error } = await _supabase
            .from('profiles')
            .select('system_data')
            .eq('user_id', user.id)
            .single();
        
        if (data && data.system_data) {
            systemData = data.system_data;
        }
    }

    async function syncToCloud() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) return;

        const { error } = await _supabase
            .from('profiles')
            .upsert({ 
                user_id: user.id, 
                system_data: systemData 
            }, { onConflict: 'user_id' });

        if (!error) showToast();
    }

    function showToast() {
        const x = document.getElementById("toast");
        x.className = "show";
        setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }

    // --- UI & REFRESH LOGIC ---
    // (existing dashboard working)

    function updateSystemInfo() {
        systemData.name = document.getElementById('edit-sys-name').value || systemData.name;
        systemData.bio = document.getElementById('edit-sys-bio').value || systemData.bio;
        refreshUI();
        syncToCloud();
    }

    function saveAlter() {
        const id = document.getElementById('edit-id').value;
        const pfpInput = document.getElementById('pfp');
        const finalize = (img) => {
            const member = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('name').value || "Unnamed",
                pronouns: document.getElementById('pronouns').value || "",
                role: document.getElementById('role').value || "",
                color: document.getElementById('color').value,
                bio: document.getElementById('bio').value || "",
                fandoms: document.getElementById('fandoms').value || "",
                pfp: img || (id ? systemData.members.find(m => m.id == id).pfp : "https://via.placeholder.com/150"),
                isFronting: id ? systemData.members.find(m => m.id == id).isFronting : false,
                frontStatus: id ? systemData.members.find(m => m.id == id).frontStatus : "",
                startTime: id ? systemData.members.find(m => m.id == id).startTime : null
            };
            if(id) {
                const idx = systemData.members.findIndex(m => m.id == id);
                systemData.members[idx] = member;
            } else { systemData.members.push(member); }
            refreshUI(); 
            clearForm();
            syncToCloud();
        };
        if (pfpInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => finalize(e.target.result);
            reader.readAsDataURL(pfpInput.files[0]);
        } else finalize();
    }

    // 

    function refreshUI() {
        document.getElementById('view-sys-name').innerText = systemData.name;
        document.getElementById('view-sys-bio').innerText = systemData.bio;
        // ... 
        //  UI logic identical to original dashboard.
    }

    window.onload = async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            await loadSystemData();
            loginSuccess();
        }
    };
</script>
