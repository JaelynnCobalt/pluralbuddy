<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Master Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --front-gold: #fff9c4; }
* { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); }
body { background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
h1, h2, h3 { color: var(--magenta) !important; }

#dashboard { display: none; width: 100%; max-width: 1100px; }
nav { margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.tab-btn, .nav-link { padding: 10px 20px; border: 2px solid var(--magenta); background: white; cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s; text-decoration: none; font-size: 0.9rem; }
.tab-btn.active { background: var(--magenta); color: white !important; }

.view-section { display: none; width: 100%; }
.view-section.active { display: block; }
section, .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 2px solid var(--soft-pink); box-shadow: 0 10px 25px rgba(255, 0, 255, 0.05); margin-bottom: 20px; }
input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 10px; }
.main-btn { background: var(--magenta); color: white !important; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; }

/* OVERVIEW DIRECTORY STYLES */
.directory-card { border-left: 10px solid; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }

/* HISTORY CHART STYLES */
.history-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
.history-table th { text-align: left; padding: 10px; border-bottom: 2px solid var(--soft-pink); font-size: 0.7rem; text-transform: uppercase; }
.history-table td { padding: 12px 10px; border-bottom: 1px solid var(--soft-pink); vertical-align: top; }
.history-container { max-height: 300px; overflow-y: auto; }

/* FRONTING */
.fronting-box { background: var(--front-gold); border: 2px dashed var(--magenta); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
.front-card-mini { background: white; padding: 10px 15px; border-radius: 15px; border: 2px solid; display: flex; align-items: center; gap: 12px; position: relative; }
.remove-front-btn { position: absolute; top: -8px; right: -8px; background: white; border: 2px solid; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }

/* Rest of your existing styles... */
#profile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 246, 0.98); z-index: 9999; overflow-y: auto; padding: 20px; }
.overlay-content { max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 30px; border: 3px solid var(--magenta); position: relative; }
.close-overlay { position: absolute; top: 20px; right: 25px; font-size: 40px; cursor: pointer; }
.floating-chat-link { position: fixed; bottom: 30px; right: 30px; background: var(--magenta); color: white !important; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(255, 0, 255, 0.3); z-index: 10001; }
#toast { visibility: hidden; min-width: 250px; background-color: var(--magenta); color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); }
#toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
@keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
@keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.profile-card { border-top: 10px solid; position: relative; display: flex; flex-direction: column; }
.pfp-img { width: 120px; height: 120px; border-radius: 15px; object-fit: cover; border: 3px solid var(--soft-pink); align-self: center; margin-bottom: 15px; }
.detail-label { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-top: 10px; opacity: 0.7; }
.detail-text { font-size: 0.95rem; font-weight: bold; white-space: pre-wrap; margin: 0; }
</style>
</head>
<body>

<div id="toast">Synced to Cloud! ✨</div>

<div id="profile-overlay">
    <div class="overlay-content">
        <span class="close-overlay" onclick="closeOverlay()">&times;</span>
        <div id="overlay-body"></div>
        <a href="chat.html" class="floating-chat-link">💬 Open Global Chat</a>
    </div>
</div>

<div id="auth-screen">
    <section class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h1>System Entry</h1>
        <input type="email" id="email-input" placeholder="Email">
        <input type="password" id="passcode-input" placeholder="Password">
        <button class="main-btn" onclick="handleAuth()">Login / Register</button>
    </section>
</div>

<div id="dashboard">
    <nav>
        <button class="tab-btn active" id="btn-overview" onclick="showTab('overview')">Overview</button>
        <button class="tab-btn" id="btn-profiles" onclick="showTab('profiles')">Profiles</button>
        <button class="tab-btn" id="btn-sidekicks" onclick="showTab('sidekicks')">Sidekicks</button>
        <a href="internal.html" class="nav-link">🏠 Internal Chat</a>
        <button class="tab-btn" style="border-color: #aaa; color: #aaa;" onclick="logout()">Logout</button>
    </nav>

    <div id="overview" class="view-section active">
        <section>
            <h1 id="view-sys-name">System Name</h1>
            <p id="view-sys-bio">Bio loading...</p>
            <div style="display: flex; gap: 10px; margin-top:15px;">
                <input type="text" id="edit-sys-name" placeholder="System Name" style="flex:1">
                <input type="text" id="edit-sys-bio" placeholder="System Bio" style="flex:2">
                <button class="mini-btn" onclick="updateSystemInfo()" style="width: 80px;">Save</button>
            </div>
        </section>

        <div class="fronting-box">
            <h3 style="margin-top:0">Currently Fronting</h3>
            <div id="fronting-display" style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px;"></div>
        </div>

        <section>
            <h3>Front History Chart</h3>
            <div class="history-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Alters</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="front-history-rows"></tbody>
                </table>
            </div>
            <button class="mini-btn" style="margin-top:10px; color:gray; border-color: #eee;" onclick="clearHistory()">Clear History</button>
        </section>

        <h3>System Directory</h3>
        <div id="overview-list"></div>
    </div>

    <div id="profiles" class="view-section">
        <section>
            <h2 id="form-title">Manage Alters</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="hidden" id="edit-id">
                <input type="text" id="name" placeholder="Name">
                <input type="text" id="pronouns" placeholder="Pronouns">
                <input type="text" id="role" placeholder="Role">
                <input type="text" id="fandoms" placeholder="Fandoms">
                <div style="grid-column: span 2;">
                    <label style="font-size: 0.7rem; font-weight:bold;">Theme Color:</label>
                    <input type="color" id="color" value="#ff00ff">
                </div>
                <textarea id="bio" placeholder="Bio..." style="grid-column: span 2; height: 100px;"></textarea>
                <input type="file" id="pfp" accept="image/*" style="grid-column: span 2;">
            </div>
            <button class="main-btn" onclick="saveAlter()" style="margin-top:10px;">Save Alter</button>
            <button class="mini-btn" id="cancel-edit" style="display:none;" onclick="clearForm()">Cancel Edit</button>
        </section>
        <div id="detailed-profiles-list" class="grid-container"></div>
    </div>

    <div id="sidekicks" class="view-section">
        <div style="display:grid; grid-template-columns: 1fr 2fr; gap:20px;">
            <section>
                <h3>Add Buddy</h3>
                <input type="text" id="sidekick-search" placeholder="Username...">
                <button class="main-btn" onclick="addSidekick()">Add Sidekick</button>
            </section>
            <section>
                <h3>My Sidekicks</h3>
                <div id="sidekicks-list"></div>
            </section>
        </div>
    </div>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let systemData = { name: "System Name", bio: "Bio...", members: [], front_history: [] };

async function handleAuth() {
    const email = document.getElementById('email-input').value;
    const password = document.getElementById('passcode-input').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) await _supabase.auth.signUp({ email, password });
    location.reload();
}

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    const { data } = await _supabase.from('profiles').select('*').eq('user_id', user.id).single();
    if (data?.system_data) systemData = data.system_data;
    if (!systemData.front_history) systemData.front_history = [];
    refreshUI();
}

async function sync() {
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').upsert({ user_id: user.id, system_data: systemData });
    showToast();
}

function toggleFront(id) {
    const m = systemData.members.find(m => m.id == id);
    m.isFronting = !m.isFronting;

    if (m.isFronting) {
        const status = prompt(`Custom status for ${m.name}? (Optional)`, "Fronting");
        const timestamp = new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        // Grouping Logic: Check if the last entry was made at the same time string
        const lastEntry = systemData.front_history[0];
        if (lastEntry && lastEntry.time === timestamp) {
            lastEntry.names.push(m.name);
            if (status && status !== "Fronting") lastEntry.status += `, ${status}`;
        } else {
            systemData.front_history.unshift({
                time: timestamp,
                names: [m.name],
                status: status || "Fronting"
            });
        }
        if (systemData.front_history.length > 50) systemData.front_history.pop();
    }
    
    refreshUI(); sync();
}

function clearHistory() {
    if(confirm("Permanently clear front history chart?")) {
        systemData.front_history = [];
        refreshUI(); sync();
    }
}

function refreshUI() {
    document.getElementById('view-sys-name').innerText = systemData.name;
    document.getElementById('view-sys-bio').innerText = systemData.bio;
    
    const frontDisplay = document.getElementById('fronting-display');
    const overviewList = document.getElementById('overview-list');
    const detailedList = document.getElementById('detailed-profiles-list');
    const historyRows = document.getElementById('front-history-rows');
    
    frontDisplay.innerHTML = ''; overviewList.innerHTML = ''; detailedList.innerHTML = ''; historyRows.innerHTML = '';

    // History Chart Rendering
    systemData.front_history.forEach(entry => {
        historyRows.innerHTML += `
            <tr>
                <td style="white-space:nowrap; opacity:0.6">${entry.time}</td>
                <td style="font-weight:bold">${entry.names.join(' & ')}</td>
                <td style="font-style:italic; opacity:0.8">${entry.status}</td>
            </tr>`;
    });

    systemData.members.forEach(m => {
        if(m.isFronting) {
            frontDisplay.innerHTML += `
                <div class="front-card-mini" style="border-color:${m.color}; color:${m.color}">
                    <img src="${m.pfp}" style="width:45px;height:45px;border-radius:10px;object-fit:cover;">
                    <b>${m.name}</b>
                    <button class="remove-front-btn" style="border-color:${m.color}; color:${m.color}" onclick="toggleFront(${m.id})">×</button>
                </div>`;
        }
        
        overviewList.innerHTML += `
            <div class="card directory-card" style="border-color:${m.color}">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div style="width:12px;height:12px;border-radius:50%;background:${m.isFronting ? '#00ff00' : '#ccc'}"></div>
                    <strong style="color:${m.color}">${m.name}</strong> <small>— ${m.role}</small>
                </div>
                <button class="mini-btn" style="width:100px; margin:0;" onclick="toggleFront(${m.id})">${m.isFronting ? 'Exit' : 'Front'}</button>
            </div>`;

        detailedList.innerHTML += `
            <div class="card profile-card" style="border-color:${m.color}">
                <img src="${m.pfp}" class="pfp-img" style="border-color:${m.color}">
                <h2 style="text-align:center; margin:0; color:${m.color} !important;">${m.name}</h2>
                <span class="detail-label">Role</span><p class="detail-text">${m.role}</p>
                <span class="detail-label">Fandoms</span><p class="detail-text">${m.fandoms}</p>
                <span class="detail-label">Bio</span><p class="detail-text">${m.bio}</p>
                <div style="margin-top:auto; padding-top:15px; display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button class="mini-btn" onclick="toggleFront(${m.id})">${m.isFronting ? 'Leave Front' : 'Front'}</button>
                    <button class="mini-btn" onclick="editAlter(${m.id})">Edit</button>
                    <button class="mini-btn" style="grid-column:span 2; color:red; border-color:red" onclick="deleteAlter(${m.id})">Delete Alter</button>
                </div>
            </div>`;
    });
}

// Keeping all other original functions unchanged...
function updateSystemInfo() { systemData.name = document.getElementById('edit-sys-name').value || systemData.name; systemData.bio = document.getElementById('edit-sys-bio').value || systemData.bio; refreshUI(); sync(); }
function saveAlter() { const id = document.getElementById('edit-id').value; const finalize = (img) => { const member = { id: id ? parseInt(id) : Date.now(), name: document.getElementById('name').value || "Unnamed", pronouns: document.getElementById('pronouns').value, role: document.getElementById('role').value, fandoms: document.getElementById('fandoms').value, color: document.getElementById('color').value, bio: document.getElementById('bio').value, pfp: img || (id ? systemData.members.find(m => m.id == id).pfp : "https://via.placeholder.com/150"), isFronting: id ? systemData.members.find(m => m.id == id).isFronting : false }; if (id) systemData.members[systemData.members.findIndex(m => m.id == id)] = member; else systemData.members.push(member); sync(); refreshUI(); clearForm(); }; const file = document.getElementById('pfp').files[0]; if (file) { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => finalize(reader.result); } else finalize(); }
function deleteAlter(id) { if(confirm("Delete this alter permanently?")) { systemData.members = systemData.members.filter(m => m.id !== id); sync(); refreshUI(); } }
function editAlter(id) { const m = systemData.members.find(m => m.id == id); document.getElementById('edit-id').value = m.id; document.getElementById('name').value = m.name; document.getElementById('pronouns').value = m.pronouns; document.getElementById('role').value = m.role; document.getElementById('fandoms').value = m.fandoms; document.getElementById('color').value = m.color; document.getElementById('bio').value = m.bio; document.getElementById('form-title').innerText = "Editing: " + m.name; document.getElementById('cancel-edit').style.display = 'block'; showTab('profiles'); }
function clearForm() { document.getElementById('edit-id').value = ''; document.getElementById('form-title').innerText = "Manage Alters"; document.getElementById('cancel-edit').style.display = 'none'; document.querySelectorAll('#profiles input, #profiles textarea').forEach(i => i.value = ''); }
async function addSidekick() { const target = document.getElementById('sidekick-search').value; const { data: friend } = await _supabase.from('profiles').select('user_id').eq('username', target).single(); if(!friend) return alert("System not found!"); const { data: { user } } = await _supabase.auth.getUser(); await _supabase.from('connections').insert([{ user_id: user.id, friend_id: friend.user_id }]); loadSidekicks(); }
async function loadSidekicks() { const list = document.getElementById('sidekicks-list'); const { data: { user } } = await _supabase.auth.getUser(); const { data: connections } = await _supabase.from('connections').select('friend_id').eq('user_id', user.id); if (!connections?.length) return list.innerHTML = "No sidekicks added."; const { data: profiles } = await _supabase.from('profiles').select('username, system_data').in('user_id', connections.map(c => c.friend_id)); list.innerHTML = ''; profiles.forEach(buddy => { const fronting = (buddy.system_data?.members || []).filter(m => m.isFronting); list.innerHTML += `<div class="card" style="cursor:pointer" onclick='openOverlay(${JSON.stringify(buddy)})'><strong>${buddy.username}</strong> — ${fronting.length ? 'Fronting: ' + fronting.map(m=>m.name).join(', ') : 'Internal'}</div>`; }); }
function openOverlay(buddy) { const bData = buddy.system_data || {}; const members = bData.members || []; document.getElementById('overlay-body').innerHTML = `<h1>${bData.name || buddy.username}</h1><p>${bData.bio || 'No bio.'}</p><div class="grid-container">${members.map(m => `<div class="card profile-card" style="border-color:${m.color}"><img src="${m.pfp}" class="pfp-img" style="border-color:${m.color}"><h2 style="color:${m.color} !important">${m.name} ${m.isFronting ? '⭕' : ''}</h2><span class="detail-label">Role</span><p class="detail-text">${m.role}</p><span class="detail-label">Bio</span><p class="detail-text">${m.bio}</p></div>`).join('')}</div>`; document.getElementById('profile-overlay').style.display = 'block'; }
function closeOverlay() { document.getElementById('profile-overlay').style.display = 'none'; }
function showTab(id) { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('btn-'+id).classList.add('active'); if(id === 'sidekicks') loadSidekicks(); }
function showToast() { const t = document.getElementById('toast'); t.className = 'show'; setTimeout(() => t.className = '', 3000); }
function logout() { _supabase.auth.signOut(); location.reload(); }
window.onload = loadData;
</script>
</body>
</html>
