
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner World Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
    --bg: #1e1e1e; /* Darker Discord-like bg */
    --sidebar: #2f3136;
    --chat-bg: #36393f;
    --magenta: #ff00ff;
    --text: #ffffff;
    --soft-pink: #ffdeeb;
}

* { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR - ROOMS */
.sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #202225; }
.sidebar-header { padding: 20px; font-weight: bold; border-bottom: 1px solid #202225; display: flex; justify-content: space-between; align-items: center; }
.room-list { flex: 1; overflow-y: auto; padding: 10px; }
.room-item { padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 2px; transition: 0.2s; color: #8e9297; }
.room-item:hover { background: #393c43; color: #dcddde; }
.room-item.active { background: #4f545c; color: white; }

/* MAIN CHAT AREA */
.chat-container { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); }
.chat-header { padding: 15px 20px; background: var(--chat-bg); border-bottom: 1px solid #202225; font-weight: bold; font-size: 1.1rem; }
#chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

/* MESSAGES */
.message { display: flex; gap: 15px; align-items: flex-start; }
.msg-pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid transparent; }
.msg-content { flex: 1; }
.msg-author { font-weight: bold; font-size: 0.95rem; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
.msg-time { font-size: 0.7rem; color: #72767d; font-weight: normal; }
.msg-text { color: #dcddde; line-height: 1.4; white-space: pre-wrap; }

/* INPUT AREA - PROXY PICKER */
.input-area { padding: 20px; background: var(--chat-bg); }
.proxy-bar { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #2f3136; padding: 8px; border-radius: 8px; }
#proxy-select { background: transparent; border: none; color: white; font-weight: bold; cursor: pointer; }
.chat-box-wrapper { display: flex; gap: 10px; background: #40444b; border-radius: 8px; padding: 10px; }
#msg-input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; resize: none; }

.nav-back { color: var(--magenta); text-decoration: none; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
.btn-small { background: var(--magenta); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <span>Inner World</span>
        <button class="btn-small" onclick="addRoom()">+</button>
    </div>
    <div class="room-list" id="room-list">
        </div>
    <div style="padding: 15px;">
        <a href="index.html" class="nav-back">← Back to Dashboard</a>
    </div>
</div>

<div class="chat-container">
    <div class="chat-header" id="current-room-name"># Select a room</div>
    <div id="chat-display"></div>
    
    <div class="input-area">
        <div class="proxy-bar">
            <span>Proxy as:</span>
            <select id="proxy-select">
                <option value="system">System</option>
            </select>
        </div>
        <div class="chat-box-wrapper">
            <textarea id="msg-input" placeholder="Message #general" rows="1"></textarea>
            <button class="btn-small" onclick="sendInternalMessage()">Send</button>
        </div>
    </div>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let systemData = { 
    members: [], 
    internalRooms: { "general": [] },
    activeRoom: "general"
};

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return window.location.href = 'index.html';
    
    const { data } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
    if (data?.system_data) {
        systemData = data.system_data;
        // Ensure internalRooms exists
        if (!systemData.internalRooms) systemData.internalRooms = { "general": [] };
        if (!systemData.activeRoom) systemData.activeRoom = "general";
    }
    renderRooms();
    renderProxies();
    renderMessages();
}

function renderProxies() {
    const select = document.getElementById('proxy-select');
    select.innerHTML = '<option value="system">System</option>';
    systemData.members.forEach(m => {
        select.innerHTML += `<option value="${m.id}">${m.name}</option>`;
    });
}

function renderRooms() {
    const list = document.getElementById('room-list');
    list.innerHTML = '';
    Object.keys(systemData.internalRooms).forEach(room => {
        const div = document.createElement('div');
        div.className = `room-item ${systemData.activeRoom === room ? 'active' : ''}`;
        div.innerText = `# ${room}`;
        div.onclick = () => switchRoom(room);
        list.appendChild(div);
    });
}

function switchRoom(room) {
    systemData.activeRoom = room;
    document.getElementById('current-room-name').innerText = `# ${room}`;
    document.getElementById('msg-input').placeholder = `Message #${room}`;
    renderRooms();
    renderMessages();
}

function addRoom() {
    const name = prompt("Enter room name (e.g. vent-room, front-chat):");
    if (name) {
        const slug = name.toLowerCase().replace(/\s+/g, '-');
        if (!systemData.internalRooms[slug]) {
            systemData.internalRooms[slug] = [];
            switchRoom(slug);
            sync();
        }
    }
}

function renderMessages() {
    const display = document.getElementById('chat-display');
    display.innerHTML = '';
    const messages = systemData.internalRooms[systemData.activeRoom] || [];
    
    messages.forEach(msg => {
        display.innerHTML += `
            <div class="message">
                <img src="${msg.pfp}" class="msg-pfp" style="border-color:${msg.color}">
                <div class="msg-content">
                    <div class="msg-author" style="color:${msg.color}">
                        ${msg.name} <span class="msg-time">${msg.time}</span>
                    </div>
                    <div class="msg-text">${msg.text}</div>
                </div>
            </div>
        `;
    });
    display.scrollTop = display.scrollHeight;
}

async function sendInternalMessage() {
    const input = document.getElementById('msg-input');
    const proxyId = document.getElementById('proxy-select').value;
    if (!input.value.trim()) return;

    let speaker;
    if (proxyId === "system") {
        speaker = { name: "System", color: "#8e9297", pfp: "https://via.placeholder.com/40" };
    } else {
        speaker = systemData.members.find(m => m.id == proxyId);
    }

    const newMessage = {
        name: speaker.name,
        color: speaker.color,
        pfp: speaker.pfp,
        text: input.value,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    };

    systemData.internalRooms[systemData.activeRoom].push(newMessage);
    input.value = '';
    renderMessages();
    sync();
}

async function sync() {
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').update({ system_data: systemData }).eq('user_id', user.id);
}

// Allow Enter to send, Shift+Enter for new line
document.getElementById('msg-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendInternalMessage();
    }
});

window.onload = loadData;
</script>
</body>
</html>
