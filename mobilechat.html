<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sidekick Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fdf2f7; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --text: #333; }
        * { font-family: -apple-system, system-ui, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .app-header {
            padding: calc(15px + env(safe-area-inset-top)) 15px 15px;
            background: white; border-bottom: 1px solid var(--soft-pink);
            display: flex; align-items: center; justify-content: space-between; z-index: 1001;
        }

        /* VIEWPORT SLIDER */
        .view-container { display: flex; flex: 1; width: 200%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .view-container.in-chat { transform: translateX(-50%); }

        /* LIST VIEW (Left Side) */
        .list-view { width: 50%; display: flex; flex-direction: column; background: white; }
        .list-section-label { font-size: 0.75rem; padding: 15px 15px 5px; color: #999; text-transform: uppercase; font-weight: bold; }
        .convo-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--bg); transition: 0.2s; }
        .convo-item:active { background: var(--soft-pink); }
        .convo-icon { width: 45px; height: 45px; border-radius: 50%; background: var(--soft-pink); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* CHAT VIEW (Right Side) */
        .chat-view { width: 50%; display: flex; flex-direction: column; background: var(--bg); }
        .chat-header { padding: 10px 15px; background: white; border-bottom: 1px solid var(--soft-pink); display: flex; align-items: center; gap: 10px; }
        
        #message-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* BUBBLES */
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-self: flex-start; }
        .msg-row.own { align-self: flex-end; flex-direction: row-reverse; }
        .msg-pfp { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid white; margin-top: auto; }
        .bubble { 
            background: white; padding: 10px 14px; border-radius: 18px; border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-size: 0.95rem; line-height: 1.4; color: #333;
        }
        .own .bubble { background: var(--magenta); color: white; border-bottom-left-radius: 18px; border-bottom-right-radius: 4px; }
        .msg-info { font-size: 0.65rem; color: #999; margin-top: 4px; }
        .own .msg-info { text-align: right; }

        /* INPUT AREA */
        .input-area { background: white; padding: 10px; border-top: 1px solid var(--soft-pink); padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        
        /* HORIZONTAL PROXY SWITCHER */
        .proxy-switcher { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .proxy-switcher::-webkit-scrollbar { display: none; }
        .proxy-btn { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; padding: 2px; }
        .proxy-btn.active { border-color: var(--magenta); transform: scale(1.1); }
        .proxy-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .input-row { display: flex; gap: 8px; align-items: center; }
        #msg-input { flex: 1; padding: 10px 15px; background: var(--bg); border: 1px solid var(--soft-pink); border-radius: 20px; font-size: 16px; outline: none; }
        .send-circle { background: var(--magenta); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* MODAL */
        #group-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--soft-pink); margin-bottom: 15px; }

        .back-btn { background: none; border: none; font-size: 1.5rem; color: var(--magenta); padding: 0 5px; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://raw.githubusercontent.com/Anisayari/Discord-Alert-Sound/main/discord_notification.mp3"></audio>

<div class="app-header">
    <a href="mobileindex.html" style="text-decoration: none; color: #888; font-weight: bold; font-size: 0.9rem;">⇠ Home</a>
    <span style="font-weight: bold; color: var(--magenta);">Sidekicks</span>
    <button onclick="openModal()" style="border:none; background:none; color:var(--magenta); font-size:1.5rem;">⊕</button>
</div>

<div class="view-container" id="main-slider">
    <div class="list-view">
        <div id="friends-list">
            <div class="list-section-label">Direct Messages</div>
            <div id="dm-list"></div>
            <div class="list-section-label">Group Chats</div>
            <div id="group-list"></div>
        </div>
    </div>

    <div class="chat-view">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">‹</button>
            <div>
                <div id="chat-header-title" style="font-weight: bold; font-size: 1rem; color: var(--magenta);">Chat</div>
                <div id="chat-header-status" style="font-size: 0.7rem; color: #999;">Active</div>
            </div>
        </div>
        <div id="message-list"></div>
        <div class="input-area">
            <div class="proxy-switcher" id="proxy-switcher"></div>
            <div class="input-row">
                <input type="text" id="msg-input" placeholder="Aa" autocomplete="off">
                <button class="send-circle" onclick="sendProxyMessage()">↑</button>
            </div>
        </div>
    </div>
</div>

<div id="group-modal">
    <div class="modal-card">
        <h3 style="margin-top: 0; color: var(--magenta);">New Group</h3>
        <input type="text" id="new-group-name" placeholder="Group Name">
        <div id="modal-friends-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 15px;"></div>
        <button onclick="createGroup()" style="width:100%; padding:12px; background:var(--magenta); color:white; border:none; border-radius:10px; font-weight:bold;">Create</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#999; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let currentChatId = null;
    let myAlters = [];
    let allFriends = [];
    let currentActiveProxy = null;

    async function init() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return window.location.href = "mobileindex.html";
        currentUser = user;

        const { data: profile } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
        myAlters = profile?.system_data?.members || [];
        renderProxySwitcher();
        loadSidebar();

        _supabase.channel('sidekick-realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'global_messages' }, payload => {
            if (payload.new.conversation_id === currentChatId) {
                renderMessage(payload.new);
                if (payload.new.sender_name !== currentActiveProxy?.name) {
                    document.getElementById('notif-sound').play().catch(()=>{});
                }
            }
        }).subscribe();
    }

    function renderProxySwitcher() {
        const switcher = document.getElementById('proxy-switcher');
        switcher.innerHTML = '';
        myAlters.forEach((alt, idx) => {
            if(idx === 0) currentActiveProxy = alt;
            switcher.innerHTML += `
                <div class="proxy-btn ${idx === 0 ? 'active' : ''}" onclick="selectProxy('${alt.id}', this)">
                    <img src="${alt.pfp}" style="background:${alt.color}">
                </div>`;
        });
    }

    function selectProxy(id, el) {
        currentActiveProxy = myAlters.find(a => a.id == id);
        document.querySelectorAll('.proxy-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    async function loadSidebar() {
        const { data: connections } = await _supabase.from('connections').select('friend_id').eq('user_id', currentUser.id);
        const friendIds = connections?.map(c => c.friend_id) || [];
        const { data: friendProfiles } = await _supabase.from('profiles').select('user_id, username').in('user_id', friendIds);
        allFriends = friendProfiles || [];

        const dmList = document.getElementById('dm-list');
        dmList.innerHTML = '';
        allFriends.forEach(f => {
            dmList.innerHTML += `
                <div class="convo-item" onclick="selectChat('${getDmId(f.user_id)}', '@${f.username}')">
                    <div class="convo-icon">👤</div>
                    <div style="font-weight:600;">@${f.username}</div>
                </div>`;
        });

        const { data: groups } = await _supabase.from('global_messages').select('conversation_id, group_name').eq('is_group', true);
        const groupList = document.getElementById('group-list');
        groupList.innerHTML = '';
        const uniqueGroups = [...new Map(groups?.map(item => [item['conversation_id'], item])).values()];
        uniqueGroups.forEach(g => {
            groupList.innerHTML += `
                <div class="convo-item" onclick="selectChat('${g.conversation_id}', '${g.group_name}')">
                    <div class="convo-icon">🏠</div>
                    <div style="font-weight:600;">${g.group_name}</div>
                </div>`;
        });
    }

    function getDmId(fId) { return [currentUser.id, fId].sort().join('_'); }

    async function selectChat(id, title) {
        currentChatId = id;
        document.getElementById('chat-header-title').innerText = title;
        document.getElementById('main-slider').classList.add('in-chat');
        
        const { data: msgs } = await _supabase.from('global_messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
        const list = document.getElementById('message-list');
        list.innerHTML = '';
        msgs?.forEach(m => renderMessage(m));
    }

    function closeChat() {
        document.getElementById('main-slider').classList.remove('in-chat');
        currentChatId = null;
    }

    function renderMessage(msg) {
        const list = document.getElementById('message-list');
        const isOwn = currentActiveProxy && msg.sender_name === currentActiveProxy.name;
        
        const div = document.createElement('div');
        div.className = `msg-row ${isOwn ? 'own' : ''}`;
        div.innerHTML = `
            <img src="${msg.sender_pfp}" class="msg-pfp">
            <div class="msg-content">
                <div class="bubble">${msg.message_text}</div>
                <div class="msg-info">${msg.sender_name}</div>
            </div>`;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendProxyMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !currentChatId) return;

        const isGroup = currentChatId.startsWith('group_');
        await _supabase.from('global_messages').insert([{
            conversation_id: currentChatId,
            sender_name: currentActiveProxy.name,
            sender_pfp: currentActiveProxy.pfp,
            sender_color: currentActiveProxy.color,
            message_text: input.value,
            is_group: isGroup,
            group_name: isGroup ? document.getElementById('chat-header-title').innerText : null
        }]);
        input.value = '';
    }

    function openModal() {
        document.getElementById('group-modal').style.display = 'flex';
        const list = document.getElementById('modal-friends-list');
        list.innerHTML = '';
        allFriends.forEach(f => {
            list.innerHTML += `<div style="padding:10px 0;"><label><input type="checkbox" value="${f.user_id}" class="g-member"> @${f.username}</label></div>`;
        });
    }
    function closeModal() { document.getElementById('group-modal').style.display = 'none'; }

    async function createGroup() {
        const name = document.getElementById('new-group-name').value;
        if(!name) return;
        const groupId = "group_" + Math.random().toString(36).substr(2, 9);
        await _supabase.from('global_messages').insert([{
            conversation_id: groupId,
            sender_name: "System",
            sender_pfp: "https://via.placeholder.com/100/ff00ff/ffffff?text=SYS",
            sender_color: "#ff00ff",
            message_text: `Group "${name}" created!`,
            is_group: true,
            group_name: name
        }]);
        closeModal();
        loadSidebar();
    }

    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendProxyMessage();
    });

    window.onload = init;
</script>
</body>
</html>
