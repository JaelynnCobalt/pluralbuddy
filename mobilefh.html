<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PluralPoint | Detailed History</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --gold: #fff9c4; }
        * { font-family: 'system-ui', -apple-system, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); margin: 0; padding: 20px 15px 80px 15px; min-height: 100vh; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; }
        .back-btn { background: var(--panel); border: 2px solid var(--soft-pink); padding: 8px 15px; border-radius: 12px; text-decoration: none; color: var(--magenta); font-weight: bold; font-size: 0.9rem; }
        .clear-btn { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 12px; font-weight: bold; font-size: 0.8rem; }

        .session-group { background: var(--panel); border-radius: 20px; border: 2px solid var(--soft-pink); margin-bottom: 15px; overflow: hidden; }
        .group-header { background: var(--soft-pink); padding: 8px 15px; font-size: 0.75rem; font-weight: bold; color: var(--magenta); display: flex; justify-content: space-between; }
        
        .entry { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f9f9f9; gap: 12px; }
        .entry-pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--magenta); object-fit: cover; }
        .entry-info { flex: 1; }
        .entry-name { font-weight: bold; font-size: 1rem; }
        .entry-status { font-size: 0.8rem; color: #666; font-style: italic; }
        
        .entry-times { text-align: right; font-size: 0.7rem; color: #888; }
        .duration-tag { display: inline-block; background: var(--gold); color: #856404; padding: 2px 6px; border-radius: 6px; font-weight: bold; margin-top: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    </style>
</head>
<body>

    <div class="header">
        <a href="mobileindex.html" class="back-btn">← Home</a>
        <button class="clear-btn" onclick="clearHistory()">Clear All</button>
    </div>

    <h2 style="color:var(--magenta); margin: 0 0 20px 5px;">System History</h2>
    <div id="history-container"></div>

<script>
    const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
    const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    let systemData = {};

    async function loadData() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) return window.location.href = 'mobileindex.html';

        const { data } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
        systemData = data?.system_data || { history: [] };
        renderHistory(systemData.history || []);
    }

    async function clearHistory() {
        if (!confirm("Are you sure you want to permanently delete all history logs?")) return;
        systemData.history = [];
        const { data: { user } } = await _supabase.auth.getUser();
        await _supabase.from('profiles').update({ system_data: systemData }).eq('user_id', user.id);
        renderHistory([]);
    }

    function renderHistory(history) {
        const container = document.getElementById('history-container');
        if (!history || history.length === 0) {
            container.innerHTML = `<div class="empty-state">No history recorded yet.</div>`;
            return;
        }

        const sorted = [...history].reverse();
        let groups = [];
        let currentGroup = [];

        sorted.forEach((entry, i) => {
            if (currentGroup.length === 0) {
                currentGroup.push(entry);
            } else {
                const prev = currentGroup[currentGroup.length - 1];
                const diff = Math.abs(new Date(entry.timestamp || entry.startTime) - new Date(prev.timestamp || prev.startTime)) / 60000;
                if (diff <= 5) currentGroup.push(entry);
                else { groups.push(currentGroup); currentGroup = [entry]; }
            }
            if (i === sorted.length - 1) groups.push(currentGroup);
        });

        container.innerHTML = '';
        groups.forEach(group => {
            const dateStr = new Date(group[0].startTime || group[0].timestamp).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
            let html = `<div class="session-group"><div class="group-header"><span>${dateStr}</span><span>${group.length > 1 ? 'Switch' : 'Front'}</span></div>`;
            
            group.forEach(entry => {
                const start = entry.startTime ? new Date(entry.startTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--';
                const end = entry.endTime ? new Date(entry.endTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Active';
                const dur = entry.duration ? `${entry.duration}m` : (entry.endTime ? 'Short' : 'Now');

                html += `
                    <div class="entry">
                        <img src="${entry.pfp}" class="entry-pfp">
                        <div class="entry-info">
                            <div class="entry-name">${entry.name}</div>
                            <div class="entry-status">${entry.status || 'Fronting'}</div>
                        </div>
                        <div class="entry-times">
                            <div>${start} - ${end}</div>
                            <div class="duration-tag">${dur}</div>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });
    }

    loadData();
</script>
</body>
</html>
