<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile System Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --front-gold: #fff9c4; }
* { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); -webkit-tap-highlight-color: transparent; }
body { background-color: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; min-height: 100vh; }

/* MOBILE OPTIMIZED NAV */
nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; }
.tab-btn, .nav-link { padding: 12px 5px; border: 2px solid var(--magenta); background: white; cursor: pointer; border-radius: 15px; font-weight: bold; text-align: center; text-decoration: none; font-size: 0.75rem; }
.tab-btn.active { background: var(--magenta); color: white !important; }
.special-link { background: var(--soft-pink); }

#dashboard { display: none; width: 100%; }
.view-section { display: none; }
.view-section.active { display: block; }

section, .card { background: var(--panel); padding: 15px; border-radius: 15px; border: 2px solid var(--soft-pink); margin-bottom: 15px; }
input, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid var(--soft-pink); border-radius: 10px; font-size: 16px; /* Prevents iOS zoom */ }

.main-btn { background: var(--magenta); color: white !important; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }

/* MOBILE FRONTING CARDS */
.fronting-box { background: var(--front-gold); border: 2px dashed var(--magenta); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
.front-card-mini { background: white; padding: 8px; border-radius: 12px; border: 2px solid; display: flex; align-items: center; gap: 10px; margin: 5px; position: relative; }

/* OVERLAY MOBILE */
#profile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 15px; }
.close-overlay { font-size: 40px; float: right; }
.floating-chat-link { position: fixed; bottom: 20px; right: 20px; background: var(--magenta); color: white !important; padding: 15px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(255, 0, 255, 0.4); }

#toast { visibility: hidden; background: var(--magenta); color: white; padding: 12px; border-radius: 50px; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 10000; }
#toast.show { visibility: visible; }
</style>
</head>
<body>

<div id="toast">Saved! ✨</div>

<div id="profile-overlay">
    <span class="close-overlay" onclick="closeOverlay()">&times;</span>
    <div id="overlay-body" style="margin-top: 50px;"></div>
    <a href="mobilechat.html" class="floating-chat-link">💬 Chat with System</a>
</div>

<div id="auth-screen">
    <section style="text-align: center; margin-top: 50px;">
        <h1>Mobile Entry</h1>
        <input type="email" id="email-input" placeholder="Email">
        <input type="password" id="passcode-input" placeholder="Password">
        <button class="main-btn" onclick="handleAuth()">Login</button>
        <p><a href="index.html" style="font-size: 0.8rem;">Switch to Desktop Version</a></p>
    </section>
</div>

<div id="dashboard">
    <nav>
        <button class="tab-btn active" id="btn-overview" onclick="showTab('overview')">Home</button>
        <button class="tab-btn" id="btn-profiles" onclick="showTab('profiles')">Alters</button>
        <button class="tab-btn" id="btn-sidekicks" onclick="showTab('sidekicks')">Buddies</button>
        <a href="mobileinternal.html" class="nav-link special-link">🏠 Internal</a>
        <a href="mobilechat.html" class="nav-link special-link">🌎 Global</a>
        <button class="tab-btn" onclick="logout()">Logout</button>
    </nav>

    <div id="overview" class="view-section active">
        <section>
            <h2 id="view-sys-name" style="margin:0">System</h2>
            <p id="view-sys-bio" style="font-size: 0.9rem;"></p>
        </section>

        <div class="fronting-box">
            <strong>Fronting Now:</strong>
            <div id="fronting-display" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
        </div>

        <h3>System List</h3>
        <div id="overview-list"></div>
    </div>

    <div id="profiles" class="view-section">
        <section>
            <h3>Add Alter</h3>
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="role" placeholder="Role">
            <textarea id="bio" placeholder="Bio..."></textarea>
            <button class="main-btn" onclick="saveAlter()">Save Alter</button>
        </section>
        <div id="detailed-profiles-list"></div>
    </div>

    <div id="sidekicks" class="view-section">
        <section>
            <input type="text" id="sidekick-search" placeholder="Search Username">
            <button class="main-btn" onclick="addSidekick()" style="margin-top:10px;">Add Sidekick</button>
        </section>
        <div id="sidekicks-list"></div>
    </div>
</div>

<script>
// Logic shared with desktop version
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);
let systemData = { members: [] };

async function handleAuth() {
    const email = document.getElementById('email-input').value;
    const password = document.getElementById('passcode-input').value;
    await _supabase.auth.signInWithPassword({ email, password });
    location.reload();
}

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    const { data } = await _supabase.from('profiles').select('*').eq('user_id', user.id).single();
    if (data?.system_data) systemData = data.system_data;
    refreshUI();
}

function refreshUI() {
    document.getElementById('view-sys-name').innerText = systemData.name || "System";
    document.getElementById('view-sys-bio').innerText = systemData.bio || "";
    
    const fDisp = document.getElementById('fronting-display');
    const oList = document.getElementById('overview-list');
    const pList = document.getElementById('detailed-profiles-list');
    
    fDisp.innerHTML = ''; oList.innerHTML = ''; pList.innerHTML = '';

    (systemData.members || []).forEach(m => {
        if(m.isFronting) {
            fDisp.innerHTML += `<div class="front-card-mini" style="border-color:${m.color}">${m.name}</div>`;
        }
        oList.innerHTML += `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 8px solid ${m.color}">
                <span><strong>${m.name}</strong></span>
                <button class="tab-btn" style="padding:5px 15px;" onclick="toggleFront(${m.id})">${m.isFronting ? 'Exit' : 'Front'}</button>
            </div>`;
        pList.innerHTML += `
            <div class="card" style="border-top: 5px solid ${m.color}">
                <strong>${m.name}</strong> (${m.role})
                <p style="font-size:0.8rem">${m.bio}</p>
            </div>`;
    });
}

function toggleFront(id) {
    const m = systemData.members.find(m => m.id == id);
    if (!m.isFronting) {
        m.isFronting = true;
        m.startTime = Date.now();
        m.currentStatus = "Mobile Front";
    } else {
        m.isFronting = false;
    }
    sync(); refreshUI();
}

async function sync() {
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').upsert({ user_id: user.id, system_data: systemData });
    showToast();
}

function showTab(id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('btn-'+id).classList.add('active');
    if(id === 'sidekicks') loadSidekicks();
}

function showToast() {
    const t = document.getElementById('toast');
    t.className = 'show';
    setTimeout(() => t.className = '', 2000);
}

function logout() { _supabase.auth.signOut(); location.reload(); }
function closeOverlay() { document.getElementById('profile-overlay').style.display = 'none'; }
window.onload = loadData;
</script>
</body>
</html>
