<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>System Master</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SystemMaster">
<link rel="apple-touch-icon" href="https://via.placeholder.com/192">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --front-gold: #fff9c4; }
* { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); -webkit-tap-highlight-color: transparent; }

body { 
    background-color: var(--bg); 
    margin: 0; 
    padding: 20px 20px 100px 20px; /* Extra bottom padding for the nav bar */
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    min-height: 100vh; 
}

h1, h2, h3 { color: var(--magenta) !important; }

#dashboard { display: none; width: 100%; max-width: 600px; }

/* MOBILE BOTTOM NAVIGATION */
nav { 
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: white;
    display: flex; 
    justify-content: space-around; 
    align-items: center;
    padding: 10px 5px calc(10px + env(safe-area-inset-bottom)) 5px;
    border-top: 2px solid var(--soft-pink);
    z-index: 1000;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
}

.tab-btn, .nav-link { 
    background: none;
    border: none;
    cursor: pointer; 
    font-weight: bold; 
    text-decoration: none; 
    font-size: 0.75rem; 
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #aaa;
}

.tab-btn.active, .nav-link:active { color: var(--magenta) !important; }
.tab-btn i { font-size: 1.2rem; } /* Placeholder for icons if you add them */

.view-section { display: none; width: 100%; }
.view-section.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

section, .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 2px solid var(--soft-pink); box-shadow: 0 5px 15px rgba(255, 0, 255, 0.05); margin-bottom: 15px; }
input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 12px; font-size: 16px; /* 16px prevents iOS auto-zoom on focus */ }
.main-btn { background: var(--magenta); color: white !important; border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; }

/* COMPACT HISTORY */
.history-group { border-left: 5px solid var(--magenta); background: #fff; margin-bottom: 15px; padding: 5px 0; border-radius: 0 15px 15px 0; }
.history-entry { padding: 8px 15px; display: flex; flex-direction: column; gap: 2px; font-size: 0.85rem; border-bottom: 1px solid #fff0f6; }
.hist-top { display: flex; justify-content: space-between; width: 100%; }
.hist-name { font-weight: bold; }
.hist-status { font-style: italic; opacity: 0.8; font-size: 0.8rem; }
.hist-time { font-family: monospace; font-size: 0.75rem; opacity: 0.6; }

/* PROFILES */
.grid-container { display: flex; flex-direction: column; gap: 15px; }
.profile-card { border-top: 10px solid; padding: 15px; }
.pfp-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--soft-pink); align-self: center; }
.mini-btn { padding: 10px; border-radius: 10px; border: 1px solid var(--soft-pink); cursor: pointer; background: white; font-size: 0.85rem; font-weight: bold; }

/* FRONTING BOX */
.fronting-box { background: var(--front-gold); border: 2px dashed var(--magenta); padding: 15px; border-radius: 20px; margin-bottom: 20px; }

/* OVERLAY */
#profile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 20px; }
.close-overlay { position: fixed; top: 20px; right: 25px; font-size: 30px; font-weight: bold; z-index: 10002; }

#toast { visibility: hidden; min-width: 200px; background-color: var(--magenta); color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 10005; }
#toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
@keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
@keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
</style>
</head>
<body>

<div id="toast">Synced! ✨</div>

<div id="profile-overlay">
    <span class="close-overlay" onclick="closeOverlay()">&times;</span>
    <div id="overlay-body"></div>
</div>

<div id="auth-screen" style="width:100%; max-width:400px;">
    <section class="card" style="margin-top: 50px; text-align: center;">
        <h1>System Entry</h1>
        <input type="email" id="email-input" placeholder="Email">
        <input type="password" id="passcode-input" placeholder="Password">
        <button class="main-btn" onclick="handleAuth()">Login / Register</button>
    </section>
</div>

<div id="dashboard">
    <nav>
        <button class="tab-btn active" id="btn-overview" onclick="showTab('overview')"><span>🏠</span>Home</button>
        <button class="tab-btn" id="btn-profiles" onclick="showTab('profiles')"><span>👥</span>Alters</button>
        <button class="tab-btn" id="btn-history" onclick="showTab('history')"><span>📜</span>History</button>
        <button class="tab-btn" id="btn-sidekicks" onclick="showTab('sidekicks')"><span>💖</span>Buddies</button>
        <a href="internal.html" class="nav-link"><span>💬</span>Chat</a>
    </nav>

    <div id="overview" class="view-section active">
        <section>
            <h1 id="view-sys-name" style="margin:0">System</h1>
            <p id="view-sys-bio" style="font-size:0.9rem; margin:10px 0;"></p>
            <button class="mini-btn" onclick="toggleEditSys()" style="width:auto; padding:5px 15px;">Edit Profile</button>
            
            <div id="sys-edit-fields" style="display:none; margin-top:15px; border-top:1px solid var(--soft-pink); padding-top:10px;">
                <input type="text" id="edit-sys-name" placeholder="System Name">
                <textarea id="edit-sys-bio" placeholder="System Bio"></textarea>
                <input type="text" id="edit-username" placeholder="Username">
                <button class="main-btn" onclick="updateSystemInfo()">Save Profile</button>
            </div>
        </section>

        <div class="fronting-box">
            <h3 style="margin-top:0; font-size:1rem;">Currently Fronting</h3>
            <div id="fronting-display" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        </div>

        <h3 style="padding-left:10px;">Directory</h3>
        <div id="overview-list"></div>
        <button class="mini-btn" style="margin-top:20px; opacity:0.5;" onclick="logout()">Logout</button>
    </div>

    <div id="profiles" class="view-section">
        <section>
            <h2 id="form-title" style="margin-top:0">Add Alter</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="role" placeholder="Role">
            <textarea id="bio" placeholder="Bio..."></textarea>
            <div style="display:flex; align-items:center; gap:10px;">
                <label style="font-size:0.8rem;">Color:</label>
                <input type="color" id="color" value="#ff00ff" style="width:50px; height:40px; padding:2px;">
                <input type="file" id="pfp" accept="image/*" style="font-size:0.7rem;">
            </div>
            <button class="main-btn" onclick="saveAlter()" style="margin-top:15px;">Save Alter</button>
            <button class="mini-btn" id="cancel-edit" style="display:none;" onclick="clearForm()">Cancel</button>
        </section>
        <div id="detailed-profiles-list" class="grid-container"></div>
    </div>

    <div id="history" class="view-section">
        <section>
            <h2 style="display:flex; justify-content:space-between; align-items:center; margin-top:0;">
                Logs
                <button class="mini-btn" style="width:80px; color:red; border-color:red; font-size:0.7rem;" onclick="clearHistory()">Clear</button>
            </h2>
            <div id="history-container"></div>
        </section>
    </div>

    <div id="sidekicks" class="view-section">
        <section>
            <h3>Add Sidekick</h3>
            <input type="text" id="sidekick-search" placeholder="Enter Username...">
            <button class="main-btn" onclick="addSidekick()">Add Buddy</button>
        </section>
        <div id="sidekicks-list"></div>
    </div>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let systemData = { name: "System Name", bio: "Bio...", members: [], history: [] };

async function handleAuth() {
    const email = document.getElementById('email-input').value;
    const password = document.getElementById('passcode-input').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) await _supabase.auth.signUp({ email, password });
    location.reload();
}

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    const { data } = await _supabase.from('profiles').select('*').eq('user_id', user.id).single();
    if (data?.system_data) {
        systemData = data.system_data;
        if(!systemData.history) systemData.history = [];
    }
    document.getElementById('edit-sys-name').value = systemData.name;
    document.getElementById('edit-sys-bio').value = systemData.bio;
    if (data?.username) document.getElementById('edit-username').value = data.username;
    refreshUI();
}

async function sync() {
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').upsert({ user_id: user.id, system_data: systemData });
    showToast();
}

function toggleEditSys() {
    const el = document.getElementById('sys-edit-fields');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function updateSystemInfo() {
    systemData.name = document.getElementById('edit-sys-name').value;
    systemData.bio = document.getElementById('edit-sys-bio').value;
    const newU = document.getElementById('edit-username').value;
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').update({ username: newU }).eq('user_id', user.id);
    toggleEditSys();
    refreshUI(); sync();
}

function toggleFront(id) {
    const m = systemData.members.find(m => m.id == id);
    const now = new Date();
    if (!m.isFronting) {
        const status = prompt(`Status for ${m.name}?`, "Fronting");
        if (status === null) return;
        m.isFronting = true;
        m.startTime = now.getTime();
        m.currentStatus = status;
    } else {
        const durationMins = Math.round((now.getTime() - m.startTime) / 60000);
        systemData.history.unshift({
            name: m.name,
            status: m.currentStatus,
            start: new Date(m.startTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            end: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            duration: durationMins,
            timestamp: now.getTime()
        });
        m.isFronting = false;
    }
    refreshUI(); sync();
}

function refreshUI() {
    document.getElementById('view-sys-name').innerText = systemData.name;
    document.getElementById('view-sys-bio').innerText = systemData.bio;
    
    const frontDisplay = document.getElementById('fronting-display');
    const overviewList = document.getElementById('overview-list');
    const detailedList = document.getElementById('detailed-profiles-list');
    const historyContainer = document.getElementById('history-container');
    
    frontDisplay.innerHTML = ''; overviewList.innerHTML = ''; detailedList.innerHTML = ''; historyContainer.innerHTML = '';

    systemData.members.forEach(m => {
        if(m.isFronting) {
            frontDisplay.innerHTML += `
                <div class="front-card-mini" style="border-color:${m.color}; color:${m.color}">
                    <img src="${m.pfp}" style="width:35px;height:35px;border-radius:8px;object-fit:cover;">
                    <div style="font-size:0.8rem;"><b>${m.name}</b></div>
                    <button class="remove-front-btn" onclick="toggleFront(${m.id})">×</button>
                </div>`;
        }
        overviewList.innerHTML += `
            <div class="card" style="border-left:8px solid ${m.color}; display:flex; justify-content:space-between; align-items:center; padding:12px 20px;">
                <div><strong style="color:${m.color}">${m.name}</strong></div>
                <button class="mini-btn" style="width:80px;" onclick="toggleFront(${m.id})">${m.isFronting ? 'Exit' : 'Front'}</button>
            </div>`;

        detailedList.innerHTML += `
            <div class="card profile-card" style="border-color:${m.color}">
                <div style="display:flex; gap:15px; align-items:center;">
                    <img src="${m.pfp}" class="pfp-img" style="border-color:${m.color}">
                    <div>
                        <h2 style="margin:0; color:${m.color} !important;">${m.name}</h2>
                        <small>${m.role}</small>
                    </div>
                </div>
                <p style="font-size:0.85rem; margin:15px 0;">${m.bio}</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="mini-btn" onclick="editAlter(${m.id})">Edit</button>
                    <button class="mini-btn" style="color:red;" onclick="deleteAlter(${m.id})">Delete</button>
                </div>
            </div>`;
    });

    let currentGroupHtml = "";
    systemData.history.forEach((entry, index) => {
        const nextEntry = systemData.history[index + 1];
        const mMatch = systemData.members.find(m => m.name === entry.name);
        const col = mMatch ? mMatch.color : 'var(--magenta)';

        currentGroupHtml += `
            <div class="history-entry" style="border-left: 3px solid ${col}">
                <div class="hist-top">
                    <span class="hist-name" style="color:${col}">${entry.name}</span>
                    <span class="hist-time">${entry.start} - ${entry.end}</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span class="hist-status">"${entry.status}"</span>
                    <span class="hist-time">${entry.duration}m</span>
                </div>
            </div>`;

        if (!nextEntry || (entry.timestamp - nextEntry.timestamp > 300000)) {
            historyContainer.innerHTML += `<div class="history-group">${currentGroupHtml}</div>`;
            currentGroupHtml = "";
        }
    });
}

function clearHistory() { if(confirm("Clear history?")) { systemData.history = []; sync(); refreshUI(); } }

function saveAlter() {
    const id = document.getElementById('edit-id').value;
    const finalize = (img) => {
        const member = {
            id: id ? parseInt(id) : Date.now(),
            name: document.getElementById('name').value || "Unnamed",
            role: document.getElementById('role').value || "Alter",
            color: document.getElementById('color').value,
            bio: document.getElementById('bio').value,
            pfp: img || (id ? systemData.members.find(m => m.id == id).pfp : "https://via.placeholder.com/150"),
            isFronting: id ? systemData.members.find(m => m.id == id).isFronting : false
        };
        if (id) systemData.members[systemData.members.findIndex(m => m.id == id)] = member;
        else systemData.members.push(member);
        sync(); refreshUI(); clearForm();
    };
    const file = document.getElementById('pfp').files[0];
    if (file) { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => finalize(reader.result); } else finalize();
}

function editAlter(id) {
    const m = systemData.members.find(m => m.id == id);
    document.getElementById('edit-id').value = m.id;
    document.getElementById('name').value = m.name;
    document.getElementById('role').value = m.role;
    document.getElementById('color').value = m.color;
    document.getElementById('bio').value = m.bio;
    document.getElementById('form-title').innerText = "Edit Alter";
    document.getElementById('cancel-edit').style.display = 'block';
    showTab('profiles');
    window.scrollTo(0,0);
}

function deleteAlter(id) { if(confirm("Delete alter?")) { systemData.members = systemData.members.filter(m => m.id !== id); sync(); refreshUI(); } }

function clearForm() {
    document.getElementById('edit-id').value = '';
    document.getElementById('form-title').innerText = "Add Alter";
    document.getElementById('cancel-edit').style.display = 'none';
    document.querySelectorAll('#profiles input, #profiles textarea').forEach(i => i.value = '');
}

async function addSidekick() {
    const target = document.getElementById('sidekick-search').value;
    const { data: friend } = await _supabase.from('profiles').select('user_id').eq('username', target).single();
    if(!friend) return alert("System not found!");
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('connections').insert([{ user_id: user.id, friend_id: friend.user_id }]);
    loadSidekicks();
}

async function loadSidekicks() {
    const list = document.getElementById('sidekicks-list');
    const { data: { user } } = await _supabase.auth.getUser();
    const { data: connections } = await _supabase.from('connections').select('friend_id').eq('user_id', user.id);
    if (!connections?.length) return list.innerHTML = "No buddies yet.";
    const { data: profiles } = await _supabase.from('profiles').select('username, system_data').in('user_id', connections.map(c => c.friend_id));
    list.innerHTML = '';
    profiles.forEach(buddy => {
        const fronting = (buddy.system_data?.members || []).filter(m => m.isFronting);
        list.innerHTML += `
            <div class="card" onclick='openOverlay(${JSON.stringify(buddy)})'>
                <strong>${buddy.username}</strong><br>
                <small>${fronting.length ? 'Fronting: ' + fronting.map(m=>m.name).join(', ') : 'Internal'}</small>
            </div>`;
    });
}

function openOverlay(buddy) {
    const bData = buddy.system_data || {};
    const members = bData.members || [];
    document.getElementById('overlay-body').innerHTML = `
        <h1 style="margin-top:40px;">${buddy.username}</h1>
        <p>${bData.bio || ''}</p>
        <div class="grid-container">${members.map(m => `
            <div class="card" style="border-left:10px solid ${m.color}">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${m.pfp}" style="width:50px;height:50px;border-radius:50%;object-fit:cover;">
                    <div><b>${m.name}</b> ${m.isFronting ? '⭕' : ''}<br><small>${m.role}</small></div>
                </div>
            </div>`).join('')}
        </div>`;
    document.getElementById('profile-overlay').style.display = 'block';
}

function closeOverlay() { document.getElementById('profile-overlay').style.display = 'none'; }

function showTab(id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('btn-'+id).classList.add('active');
    if(id === 'sidekicks') loadSidekicks();
    window.scrollTo(0,0);
}

function showToast() { const t = document.getElementById('toast'); t.className = 'show'; setTimeout(() => t.className = '', 3000); }
function logout() { _supabase.auth.signOut(); location.reload(); }
window.onload = loadData;
</script>
</body>
</html>
