<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PluralPoint Home</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --front-gold: #fff9c4; --nav-height: 70px; }
* { font-family: 'system-ui', -apple-system, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body { background-color: var(--bg); margin: 0; padding: 20px 15px calc(var(--nav-height) + 30px) 15px; min-height: 100vh; }

/* NAVIGATION */
.bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height); background: white; display: flex; justify-content: space-around; border-top: 2px solid var(--soft-pink); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: #888; font-size: 0.7rem; font-weight: bold; flex: 1; padding-top: 10px; text-decoration: none; }
.nav-item.active { color: var(--magenta); }
.nav-item span { font-size: 1.4rem; }

/* UI ELEMENTS */
.view-section { display: none; }
.view-section.active { display: block; }
section, .card { background: var(--panel); padding: 15px; border-radius: 20px; border: 2px solid var(--soft-pink); margin-bottom: 15px; }
.main-btn { background: var(--magenta); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 1rem; margin-top: 5px; }
.secondary-btn { background: var(--soft-pink); color: var(--magenta); border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 5px; }
input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 12px; font-size: 16px; background: #fafafa; }

/* SYSTEM HEADER */
.sys-header-card { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
.sys-pfp-lg { width: 65px; height: 65px; border-radius: 18px; object-fit: cover; border: 2px solid var(--magenta); background: white; }

/* FRONTING & HISTORY */
.fronting-container { background: var(--front-gold); padding: 15px; border-radius: 20px; border: 2px dashed var(--magenta); margin-bottom: 20px; text-align: center; }
.front-bubble { display: inline-flex; flex-direction: column; align-items: center; margin: 5px; position: relative; }
.mini-pfp { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 3px solid var(--magenta); background: white; }
.remove-front-dot { position: absolute; top: -2px; right: -2px; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; border: 2px solid white; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 10; }

.history-card { padding: 10px 15px; border-bottom: 1px solid var(--soft-pink); display: flex; align-items: center; gap: 12px; }

/* OVERLAYS */
.overlay { display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 20px; overflow-y: auto; padding-top: env(safe-area-inset-top); }
.close-overlay { background: var(--bg); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; color: var(--magenta); }

#toast { visibility: hidden; background: var(--magenta); color: white; padding: 12px 25px; border-radius: 50px; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 3000; }
#toast.show { visibility: visible; }
</style>
</head>
<body>

<div id="toast">Synced ✨</div>

<div id="editor-overlay" class="overlay">
    <button class="close-overlay" onclick="closeOverlay()">← Back</button>
    <div id="editor-content"></div>
</div>

<div id="auth-screen">
    <section style="text-align: center; margin-top: 80px;">
        <h1 style="color:var(--magenta)">Sidekick</h1>
        <input type="email" id="email-input" placeholder="Email">
        <input type="password" id="passcode-input" placeholder="Password">
        <button class="main-btn" onclick="handleAuth()">Login</button>
    </section>
</div>

<div id="dashboard" style="display:none;">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:1.5rem;">📱</span>
            <h2 style="margin:0; font-size: 1.1rem; color: #555;">Dashboard</h2>
        </div>
        <button onclick="openSystemEditor()" style="background:none; border:none; font-size:1.4rem;">⚙️</button>
    </header>

    <div id="overview" class="view-section active">
        <div class="card sys-header-card">
            <img src="" id="sys-pfp-display" class="sys-pfp-lg">
            <div style="flex:1">
                <h2 id="view-sys-name" style="margin:0; font-size:1.2rem;">System</h2>
                <div id="view-sys-user" style="font-size:0.8rem; color:var(--magenta);">@username</div>
            </div>
            <button onclick="logout()" style="background:none; border:1px solid #ccc; padding:4px 8px; border-radius:8px; font-size:0.7rem;">Exit</button>
        </div>

        <div class="fronting-container">
            <h4 style="margin: 0 0 10px 0">Fronting Now</h4>
            <div id="fronting-display" style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;"></div>
        </div>
        
        <div id="overview-list" style="margin-bottom:20px;"></div>

        <section style="padding: 0; overflow: hidden;">
            <div style="background: var(--soft-pink); padding: 10px 15px; font-weight: bold; color: var(--magenta); display: flex; justify-content: space-between;">
                <span>Front History</span>
                <button onclick="clearHistory()" style="background:none; border:none; font-size:0.7rem; color:#888;">Clear</button>
            </div>
            <div id="front-history-list" style="max-height: 250px; overflow-y: auto;"></div>
        </section>
    </div>

    <div id="profiles" class="view-section">
        <button class="main-btn" style="margin-bottom:15px;" onclick="openAlterEditor()">+ New Alter</button>
        <div id="detailed-profiles-list"></div>
    </div>

    <div id="sidekicks" class="view-section">
        <section>
            <input type="text" id="friend-search" placeholder="Username...">
            <button class="main-btn" onclick="addFriend()">Add Sidekick</button>
        </section>
        <div id="friends-list-container"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" id="tab-overview" onclick="showTab('overview')"><span>🏠</span>Home</button>
        <button class="nav-item" id="tab-profiles" onclick="showTab('profiles')"><span>👥</span>Alters</button>
        <a href="mobileinternal.html" class="nav-item"><span>💭</span>Internal</a>
        <a href="mobilechat.html" class="nav-item"><span>🌎</span>Global</a>
        <button class="nav-item" id="tab-sidekicks" onclick="showTab('sidekicks')"><span>✨</span>Friends</button>
    </nav>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);
let systemData = { name: '', bio: '', pfp: '', members: [], history: [] };
let currentUser = null;
let currentUsername = "";

async function handleAuth() {
    const email = document.getElementById('email-input').value;
    const password = document.getElementById('passcode-input').value;
    await _supabase.auth.signInWithPassword({ email, password });
    location.reload();
}

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return;
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    const { data } = await _supabase.from('profiles').select('*').eq('user_id', user.id).single();
    if (data) {
        if (data.system_data) systemData = data.system_data;
        if (!systemData.history) systemData.history = [];
        currentUsername = data.username || "";
    }
    refreshUI();
    loadFriendsLive();
}

function refreshUI() {
    document.getElementById('view-sys-name').innerText = systemData.name || "System";
    document.getElementById('view-sys-user').innerText = "@" + currentUsername;
    document.getElementById('sys-pfp-display').src = systemData.pfp || "https://via.placeholder.com/150";
    
    const fDisp = document.getElementById('fronting-display');
    const oList = document.getElementById('overview-list');
    const hList = document.getElementById('front-history-list');
    fDisp.innerHTML = ''; oList.innerHTML = ''; hList.innerHTML = '';

    (systemData.members || []).forEach(m => {
        if(m.isFronting) {
            fDisp.innerHTML += `
                <div class="front-bubble">
                    <button class="remove-front-dot" onclick="toggleFront(${m.id})">×</button>
                    <img src="${m.pfp}" class="mini-pfp" style="border-color:${m.color}">
                    <div style="font-size:0.6rem; font-weight:bold; margin-top:2px;">${m.name}</div>
                </div>`;
        }
        oList.innerHTML += `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 8px solid ${m.color}">
                <strong>${m.name}</strong>
                <button class="main-btn" style="width:auto; padding:8px 12px; margin:0;" onclick="toggleFront(${m.id})">
                    ${m.isFronting ? 'Leave' : 'Front'}
                </button>
            </div>`;
    });

    [...systemData.history].reverse().slice(0, 15).forEach(entry => {
        hList.innerHTML += `<div class="history-card">
            <img src="${entry.pfp}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
            <div style="flex:1"><div style="font-size:0.85rem; font-weight:bold;">${entry.name}</div><div style="font-size:0.7rem; color:#666;">${entry.status || 'Fronting'}</div></div>
            <div style="font-size:0.7rem; color:#bbb;">${entry.time}</div>
        </div>`;
    });

    const pList = document.getElementById('detailed-profiles-list');
    pList.innerHTML = '';
    (systemData.members || []).forEach(m => {
        pList.innerHTML += `<div class="card" onclick="openAlterEditor(${m.id})" style="display:flex; align-items:center; gap:15px; border-left: 8px solid ${m.color}">
            <img src="${m.pfp}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">
            <div style="flex:1"><div style="font-weight:bold;">${m.name}</div><div style="font-size:0.8rem; color:#888;">${m.role || ''} • ${m.pronouns || ''}</div></div>
            <span>›</span></div>`;
    });
}

function openSystemEditor() {
    const overlay = document.getElementById('editor-overlay');
    overlay.style.display = 'block';
    document.getElementById('editor-content').innerHTML = `
        <h2 style="color:var(--magenta)">System Settings</h2>
        <div style="text-align:center; margin-bottom:15px;">
            <img src="${systemData.pfp || 'https://via.placeholder.com/150'}" id="preview-sys-pfp" style="width:120px; height:120px; border-radius:20px; object-fit:cover; border:4px solid var(--magenta)">
            <input type="file" id="sys-file-upload" accept="image/*" style="display:none" onchange="handleSystemUpload(this)">
            <button class="secondary-btn" onclick="document.getElementById('sys-file-upload').click()">📷 Change System PFP</button>
        </div>
        <label>System Name</label><input type="text" id="edit-sys-name" value="${systemData.name || ''}">
        <label>Username</label><input type="text" id="edit-sys-user" value="${currentUsername}">
        <label>System Bio</label><textarea id="edit-sys-bio" rows="4">${systemData.bio || ''}</textarea>
        <button class="main-btn" onclick="saveSystemSettings()">Save System Profile</button>`;
}

function handleSystemUpload(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => { document.getElementById('preview-sys-pfp').src = e.target.result; systemData.pfp = e.target.result; };
    reader.readAsDataURL(file);
}

async function saveSystemSettings() {
    systemData.name = document.getElementById('edit-sys-name').value;
    systemData.bio = document.getElementById('edit-sys-bio').value;
    currentUsername = document.getElementById('edit-sys-user').value.replace('@','');
    await _supabase.from('profiles').update({ system_data: systemData, username: currentUsername }).eq('user_id', currentUser.id);
    refreshUI(); closeOverlay(); showToast("System Updated!");
}

function openAlterEditor(id = null) {
    const m = id ? systemData.members.find(x => x.id === id) : { id: Date.now(), name: '', role: '', pronouns: '', pfp: '', color: '#ff00ff', bio: '', isNew: true };
    const overlay = document.getElementById('editor-overlay');
    overlay.style.display = 'block';
    document.getElementById('editor-content').innerHTML = `
        <h2 style="color:var(--magenta)">${m.isNew ? 'New Alter' : 'Edit Profile'}</h2>
        <div style="text-align:center; margin-bottom:15px;">
            <img src="${m.pfp || 'https://via.placeholder.com/150'}" id="preview-pfp" style="width:120px; height:120px; border-radius:20px; object-fit:cover; border:4px solid ${m.color}">
            <input type="file" id="file-upload" accept="image/*" style="display:none" onchange="handleAlterUpload(this)">
            <button class="secondary-btn" onclick="document.getElementById('file-upload').click()">📷 Upload Photo</button>
        </div>
        <label>Name</label><input type="text" id="edit-name" value="${m.name || ''}">
        <label>PFP URL (Optional)</label><input type="text" id="edit-pfp" value="${m.pfp || ''}" onchange="document.getElementById('preview-pfp').src=this.value">
        <label>Role</label><input type="text" id="edit-role" value="${m.role || ''}">
        <label>Pronouns</label><input type="text" id="edit-pronouns" value="${m.pronouns || ''}">
        <label>Theme Color</label><input type="color" id="edit-color" value="${m.color || '#ff00ff'}" style="height:50px;">
        <label>Bio / Notes</label><textarea id="edit-bio" rows="4">${m.bio || ''}</textarea>
        <button class="main-btn" onclick="saveAlter(${m.id}, ${m.isNew || false})">Save Alter</button>
        ${!m.isNew ? `<button class="main-btn" style="background:none; color:red; border:1px solid red; margin-top:15px;" onclick="deleteAlter(${m.id})">Delete</button>` : ''}`;
}

function handleAlterUpload(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => { document.getElementById('preview-pfp').src = e.target.result; };
    reader.readAsDataURL(file);
}

function saveAlter(id, isNew) {
    const data = {
        id, name: document.getElementById('edit-name').value, 
        pfp: document.getElementById('preview-pfp').src, 
        role: document.getElementById('edit-role').value,
        pronouns: document.getElementById('edit-pronouns').value,
        color: document.getElementById('edit-color').value,
        bio: document.getElementById('edit-bio').value,
        isFronting: isNew ? false : systemData.members.find(x => x.id === id).isFronting,
        status: isNew ? "" : (systemData.members.find(x => x.id === id).status || "")
    };
    if(isNew) systemData.members.push(data);
    else systemData.members[systemData.members.findIndex(x => x.id === id)] = data;
    sync(); refreshUI(); closeOverlay();
}

function toggleFront(id) {
    const m = systemData.members.find(m => m.id == id);
    m.isFronting = !m.isFronting;
    if(m.isFronting) {
        const s = prompt(`Status for ${m.name}?`);
        m.status = s || "";
        systemData.history.push({ name: m.name, pfp: m.pfp, status: m.status, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        if (systemData.history.length > 20) systemData.history.shift();
    }
    sync(); refreshUI();
}

async function addFriend() {
    const user = document.getElementById('friend-search').value.replace('@','');
    const { data } = await _supabase.from('profiles').select('user_id').eq('username', user).single();
    if(data) { await _supabase.from('connections').insert([{ user_id: currentUser.id, friend_id: data.user_id }]); loadFriendsLive(); showToast("Friend Added!"); }
}

async function loadFriendsLive() {
    const { data: connections } = await _supabase.from('connections').select('friend_id').eq('user_id', currentUser.id);
    const { data: profiles } = await _supabase.from('profiles').select('username, system_data').in('user_id', connections?.map(c => c.friend_id) || []);
    const container = document.getElementById('friends-list-container');
    container.innerHTML = '';
    profiles?.forEach(p => {
        const fronts = (p.system_data?.members || []).filter(m => m.isFronting);
        let fH = fronts.length > 0 ? '' : '<div style="font-size:0.75rem; color:#999;">Offline</div>';
        fronts.forEach(f => fH += `<div style="display:flex; align-items:center; gap:8px; margin-top:5px;"><img src="${f.pfp}" style="width:30px; height:30px; border-radius:50%; border:2px solid ${f.color}"><div style="font-size:0.8rem;"><strong>${f.name}</strong>: ${f.status || 'Fronting'}</div></div>`);
        container.innerHTML += `<div class="card"><strong>@${p.username}</strong>${fH}</div>`;
    });
}

async function sync() { await _supabase.from('profiles').update({ system_data: systemData }).eq('user_id', currentUser.id); showToast("Synced ✨"); }
function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = 'show'; setTimeout(() => t.className = '', 2000); }
function showTab(id) { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('tab-'+id).classList.add('active'); }
function closeOverlay() { document.getElementById('editor-overlay').style.display = 'none'; }
function logout() { _supabase.auth.signOut(); location.reload(); }
function clearHistory() { if(confirm("Clear history?")) { systemData.history = []; sync(); refreshUI(); } }
window.onload = loadData;
</script>
</body>
</html>
