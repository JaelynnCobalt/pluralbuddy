<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>System Mobile</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --front-gold: #fff9c4; --nav-height: 70px; }
* { font-family: 'system-ui', -apple-system, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body { 
    background-color: var(--bg); 
    margin: 0; 
    padding: 20px 15px calc(var(--nav-height) + 20px) 15px; 
    min-height: 100vh; 
}

/* TOP HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.logout-btn { font-size: 0.8rem; border: 1px solid #ccc; padding: 5px 10px; border-radius: 8px; background: white; color: #888; }

/* BOTTOM NAVIGATION BAR */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: var(--nav-height);
    background: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 2px solid var(--soft-pink);
    box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
    z-index: 1000;
    padding-bottom: env(safe-area-inset-bottom); /* Fix for notched iPhones */
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    background: none;
    border: none;
    color: #888;
    font-size: 0.7rem;
    font-weight: bold;
    flex: 1;
}

.nav-item.active { color: var(--magenta); }
.nav-item span { font-size: 1.4rem; margin-bottom: 2px; }

/* UI ELEMENTS */
.view-section { display: none; }
.view-section.active { display: block; }
section, .card { background: var(--panel); padding: 15px; border-radius: 20px; border: 2px solid var(--soft-pink); margin-bottom: 15px; }
.main-btn { background: var(--magenta); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 1rem; }
input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 12px; font-size: 16px; }

/* FRONTING DISPLAY */
.fronting-container { background: var(--front-gold); padding: 15px; border-radius: 20px; border: 2px dashed var(--magenta); margin-bottom: 20px; text-align: center; }
.mini-pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--magenta); }

#toast { visibility: hidden; background: var(--magenta); color: white; padding: 12px 25px; border-radius: 50px; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 10001; }
#toast.show { visibility: visible; }
</style>
</head>
<body>

<div id="toast">Changes Synced! ✨</div>

<div id="auth-screen">
    <section style="text-align: center; margin-top: 100px;">
        <h1 style="color:var(--magenta)">System Mobile</h1>
        <input type="email" id="email-input" placeholder="Email">
        <input type="password" id="passcode-input" placeholder="Password">
        <button class="main-btn" onclick="handleAuth()">Login</button>
    </section>
</div>

<div id="dashboard" style="display:none;">
    <header>
        <h2 id="view-sys-name" style="margin:0; font-size: 1.2rem;">System</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div id="overview" class="view-section active">
        <div class="fronting-container">
            <h4 style="margin: 0 0 10px 0">Fronting Now</h4>
            <div id="fronting-display" style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;"></div>
        </div>
        <div id="overview-list"></div>
    </div>

    <div id="profiles" class="view-section">
        <section>
            <h3>Add Member</h3>
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="role" placeholder="Role">
            <button class="main-btn" onclick="saveAlter()">Quick Add</button>
        </section>
        <div id="detailed-profiles-list"></div>
    </div>

    <div id="sidekicks" class="view-section">
        <input type="text" id="sidekick-search" placeholder="Search systems...">
        <button class="main-btn" onclick="addSidekick()">Add Sidekick</button>
        <div id="sidekicks-list" style="margin-top:15px;"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" id="tab-overview" onclick="showTab('overview')">
            <span>🏠</span>Home
        </button>
        <button class="nav-item" id="tab-profiles" onclick="showTab('profiles')">
            <span>👥</span>Alters
        </button>
        <a href="mobileinternal.html" class="nav-item">
            <span>💭</span>Internal
        </a>
        <a href="mobilechat.html" class="nav-item">
            <span>🌎</span>Global
        </a>
        <button class="nav-item" id="tab-sidekicks" onclick="showTab('sidekicks')">
            <span>✨</span>Sidekicks
        </button>
    </nav>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);
let systemData = { members: [] };

async function handleAuth() {
    const email = document.getElementById('email-input').value;
    const password = document.getElementById('passcode-input').value;
    await _supabase.auth.signInWithPassword({ email, password });
    location.reload();
}

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    const { data } = await _supabase.from('profiles').select('*').eq('user_id', user.id).single();
    if (data?.system_data) systemData = data.system_data;
    refreshUI();
}

function refreshUI() {
    document.getElementById('view-sys-name').innerText = systemData.name || "System";
    const fDisp = document.getElementById('fronting-display');
    const oList = document.getElementById('overview-list');
    
    fDisp.innerHTML = ''; oList.innerHTML = '';

    (systemData.members || []).forEach(m => {
        if(m.isFronting) {
            fDisp.innerHTML += `<img src="${m.pfp}" class="mini-pfp" title="${m.name}" style="border-color:${m.color}">`;
        }
        oList.innerHTML += `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 10px solid ${m.color}">
                <strong>${m.name}</strong>
                <button class="logout-btn" style="color:var(--magenta); border-color:var(--magenta)" onclick="toggleFront(${m.id})">
                    ${m.isFronting ? 'Exit' : 'Front'}
                </button>
            </div>`;
    });
}

function showTab(id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('tab-'+id).classList.add('active');
}

function toggleFront(id) {
    const m = systemData.members.find(m => m.id == id);
    m.isFronting = !m.isFronting;
    if(m.isFronting) m.startTime = Date.now();
    sync(); refreshUI();
}

async function sync() {
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').upsert({ user_id: user.id, system_data: systemData });
    showToast();
}

function showToast() {
    const t = document.getElementById('toast');
    t.className = 'show';
    setTimeout(() => t.className = '', 2000);
}

function logout() { _supabase.auth.signOut(); location.reload(); }
window.onload = loadData;
</script>
</body>
</html>
