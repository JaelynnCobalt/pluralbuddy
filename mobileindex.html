<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --front-gold: #fff9c4; }
        * { font-family: 'Georgia', serif; box-sizing: border-box; color: var(--magenta); }
        body { background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* LOADING SCREEN - Now with a fail-safe */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-container { width: 200px; height: 6px; background: var(--soft-pink); border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .loader-bar { width: 0%; height: 100%; background: var(--magenta); transition: width 0.3s ease; }
        
        #dashboard { display: none; width: 100%; max-width: 1100px; }
        nav { margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .tab-btn, .nav-link { padding: 10px 20px; border: 2px solid var(--magenta); background: white; cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s; text-decoration: none; font-size: 0.9rem; display: inline-block; text-align: center; }
        .tab-btn.active { background: var(--magenta); color: white !important; }
        
        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }
        section, .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 2px solid var(--soft-pink); box-shadow: 0 10px 25px rgba(255, 0, 255, 0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 10px; }
        .main-btn { background: var(--magenta); color: white !important; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; }
        
        .directory-card { border-left: 10px solid; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .fronting-box { background: var(--front-gold); border: 2px dashed var(--magenta); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .front-card-mini { background: white; padding: 10px 15px; border-radius: 15px; border: 2px solid; display: flex; align-items: center; gap: 12px; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: var(--magenta); color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 30000; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-text">SYNCING INNER WORLD...</div>
    <div class="loader-container"><div id="load-progress" class="loader-bar"></div></div>
</div>

<div id="toast">Synced! ✨</div>

<div id="auth-screen" style="display:none;">
    <section class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
        <h1>System Entry</h1>
        <input type="email" id="email-input" placeholder="Email">
        <input type="password" id="passcode-input" placeholder="Password">
        <button class="main-btn" onclick="handleAuth()">Login / Register</button>
    </section>
</div>

<div id="dashboard">
    <nav>
        <button class="tab-btn active" id="btn-overview" onclick="showTab('overview')">Overview</button>
        <a href="alters.html" class="nav-link">Manage Alters 👤</a>
        <button class="tab-btn" id="btn-sidekicks" onclick="showTab('sidekicks')">Sidekicks</button>
        <button class="tab-btn" style="border-color: #aaa; color: #aaa;" onclick="logout()">Logout</button>
    </nav>

    <div id="overview" class="view-section active">
        <section>
            <h1 id="view-sys-name">System Name</h1>
            <p id="view-sys-bio">System Bio...</p>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="edit-sys-name" placeholder="New Name">
                <input type="text" id="edit-sys-bio" placeholder="New Bio">
                <button class="main-btn" style="width: 80px;" onclick="updateSystemInfo()">Save</button>
            </div>
        </section>

        <div class="fronting-box">
            <h3>Currently Fronting</h3>
            <div id="fronting-display" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        </div>

        <h3>System Directory</h3>
        <div id="overview-list"></div>
    </div>

    <div id="sidekicks" class="view-section">
        <section>
            <h3>Add Buddy</h3>
            <input type="text" id="sidekick-search" placeholder="Username...">
            <button class="main-btn" onclick="addSidekick()">Add Sidekick</button>
        </section>
        <div id="sidekicks-list"></div>
    </div>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let systemData = { name: "System", bio: "", members: [], front_history: [] };

async function handleAuth() {
    const email = document.getElementById('email-input').value;
    const password = document.getElementById('passcode-input').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) await _supabase.auth.signUp({ email, password });
    location.reload();
}

async function sync() {
    const { data: { user } } = await _supabase.auth.getUser();
    if(!user) return;
    await _supabase.from('profiles').upsert({ user_id: user.id, system_data: systemData });
    document.getElementById('toast').className = 'show';
    setTimeout(() => document.getElementById('toast').className = '', 3000);
}

function updateSystemInfo() {
    systemData.name = document.getElementById('edit-sys-name').value || systemData.name;
    systemData.bio = document.getElementById('edit-sys-bio').value || systemData.bio;
    refreshUI(); sync();
}

function refreshUI() {
    document.getElementById('view-sys-name').innerText = systemData.name;
    document.getElementById('view-sys-bio').innerText = systemData.bio;
    const frontDisplay = document.getElementById('fronting-display');
    const overviewList = document.getElementById('overview-list');
    
    frontDisplay.innerHTML = ''; overviewList.innerHTML = '';

    systemData.members.forEach(m => {
        if(m.isFronting) frontDisplay.innerHTML += `<div class="front-card-mini" style="border-color:${m.color}"><b>${m.name}</b></div>`;
        overviewList.innerHTML += `<div class="card directory-card" style="border-color:${m.color}"><strong>${m.name}</strong><button class="main-btn" style="width:70px; padding:5px;" onclick="toggleFront(${m.id})">${m.isFronting ? 'Exit' : 'Front'}</button></div>`;
    });
}

function toggleFront(id) {
    const m = systemData.members.find(m => m.id == id);
    if(!m) return;
    m.isFronting = !m.isFronting;
    refreshUI(); sync();
}

async function loadData() {
    const bar = document.getElementById('load-progress');
    const loader = document.getElementById('loading-screen');
    
    // Fail-safe: If it takes more than 6 seconds, just show the screen regardless
    setTimeout(() => {
        if(loader.style.display !== 'none') {
            console.log("Loading taking too long, forcing display.");
            loader.style.display = 'none';
        }
    }, 6000);

    bar.style.width = '30%';
    const { data: { user } } = await _supabase.auth.getUser();
    
    if (!user) {
        loader.style.display = 'none';
        document.getElementById('auth-screen').style.display = 'block';
        return;
    }

    bar.style.width = '60%';
    const { data, error } = await _supabase.from('profiles').select('*').eq('user_id', user.id).single();
    
    if (data?.system_data) systemData = data.system_data;
    
    bar.style.width = '100%';
    refreshUI();
    
    setTimeout(() => {
        loader.style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }, 500);
}

function showTab(id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function logout() { _supabase.auth.signOut(); location.reload(); }
window.onload = loadData;
</script>
</body>
</html>
