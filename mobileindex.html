<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PluralPoint | Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f6; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --front-gold: #fff9c4; --nav-height: 70px; }
        * { font-family: 'system-ui', -apple-system, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); margin: 0; padding: 20px 15px calc(var(--nav-height) + 30px) 15px; min-height: 100vh; }

        /* LOADING SCREEN */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loading-text { font-family: "Comic Sans MS", "Chalkboard SE", cursive; font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; color: var(--magenta); text-shadow: 1px 1px 0px white; }
        .sketch-loader-container { position: relative; width: 250px; height: 30px; border: 3px solid var(--magenta); background: white; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; padding: 4px; display: flex; align-items: center; box-shadow: 4px 4px 0px var(--soft-pink); }
        .sketch-bar { height: 100%; background: var(--magenta); width: 0%; border-radius: 5px; transition: width 0.4s ease; }
        .sketch-star { position: absolute; left: 0%; font-size: 2.2rem; color: var(--magenta); line-height: 1; margin-top: -2px; transition: left 0.4s ease; animation: jitter 0.2s infinite alternate; text-shadow: 2px 2px 0px var(--soft-pink); }
        @keyframes jitter { 0% { transform: scale(1) rotate(-8deg); } 100% { transform: scale(1.2) rotate(8deg); } }

        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height); background: white; display: flex; justify-content: space-around; border-top: 2px solid var(--soft-pink); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: #888; font-size: 0.7rem; font-weight: bold; flex: 1; padding-top: 10px; text-decoration: none; }
        .nav-item.active { color: var(--magenta); }
        .nav-item span { font-size: 1.4rem; }

        /* UI ELEMENTS */
        .view-section { display: none; }
        .view-section.active { display: block; }
        section, .card { background: var(--panel); padding: 15px; border-radius: 20px; border: 2px solid var(--soft-pink); margin-bottom: 15px; }
        .main-btn { background: var(--magenta); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 1rem; margin-top: 5px; cursor: pointer; }
        .logout-btn { background: white; color: var(--magenta); border: 2px solid var(--soft-pink); padding: 5px 12px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 12px; font-size: 16px; background: #fafafa; }
        
        /* FRONTING */
        .fronting-container { background: var(--front-gold); padding: 15px; border-radius: 20px; border: 2px dashed var(--magenta); margin-bottom: 20px; text-align: center; }
        .front-bubble { display: inline-flex; flex-direction: column; align-items: center; margin: 5px; position: relative; }
        .mini-pfp { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 3px solid var(--magenta); background: white; }
        .remove-front-dot { position: absolute; top: -2px; right: -2px; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; border: 2px solid white; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        .history-card { padding: 10px 15px; border-bottom: 1px solid var(--soft-pink); display: flex; align-items: center; gap: 12px; }
        
        #toast { visibility: hidden; background: var(--magenta); color: white; padding: 12px 25px; border-radius: 50px; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 3000; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-text">CONNECTING...</div>
    <div class="sketch-loader-container">
        <div class="sketch-bar" id="load-bar"></div>
        <div class="sketch-star" id="load-star">✨</div>
    </div>
</div>

<div id="toast">Synced ✨</div>

<div id="auth-screen" style="display:none;">
    <section style="text-align: center; margin-top: 80px;">
        <h1 style="color:var(--magenta)">PluralPoint</h1>
        <input type="email" id="email-input" placeholder="Email">
        <input type="password" id="passcode-input" placeholder="Password">
        <button class="main-btn" onclick="handleAuth()">Login</button>
    </section>
</div>

<div id="dashboard" style="display:none;">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size: 1.1rem; color: #555;">Dashboard</h2>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="logout-btn" onclick="logout()">Logout</button>
            <button onclick="showSettings()" style="background:none; border:none; font-size:1.4rem; cursor:pointer;">⚙️</button>
        </div>
    </header>

    <div id="overview" class="view-section active">
        <div class="card" style="display:flex; align-items:center; gap:15px;">
            <img src="" id="sys-pfp-display" style="width:60px; height:60px; border-radius:15px; object-fit:cover; border:2px solid var(--magenta);">
            <div style="flex:1">
                <h2 id="view-sys-name" style="margin:0; font-size:1.1rem;">System</h2>
                <div id="view-sys-user" style="font-size:0.8rem; color:var(--magenta);">@username</div>
            </div>
        </div>

        <div class="fronting-container">
            <h4 style="margin: 0 0 10px 0">Fronting Now</h4>
            <div id="fronting-display" style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;"></div>
        </div>
        
        <div id="overview-list"></div>

        <section style="padding: 0; overflow: hidden; margin-top:20px;">
            <div style="background: var(--soft-pink); padding: 10px 15px; font-weight: bold; color: var(--magenta); display: flex; justify-content: space-between; align-items: center;">
                <span>Quick History</span>
                <div style="display:flex; gap:10px;">
                    <a href="mobilefh.html" style="text-decoration:none; background:white; border-radius:8px; padding:5px 12px; font-size:0.75rem; color:var(--magenta); font-weight:bold;">Full Logs</a>
                    <button onclick="clearHistory()" style="background:none; border:none; font-size:0.7rem; color:#888;">Clear</button>
                </div>
            </div>
            <div id="front-history-list" style="max-height: 250px; overflow-y: auto;"></div>
        </section>
    </div>

    <div id="sidekicks" class="view-section">
        <section>
            <input type="text" id="friend-search" placeholder="Username...">
            <button class="main-btn">Add Sidekick</button>
        </section>
        <div id="friends-list-container"></div>
    </div>

    <div id="settings" class="view-section">
        <section>
            <h3 style="color:var(--magenta); margin-top:0;">System Profile</h3>
            <div style="text-align:center; margin-bottom:15px;">
                <img id="edit-pfp-preview" src="" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--magenta); object-fit:cover;">
                <label for="pfp-upload" style="display:block; margin-top:10px; font-size:0.8rem; color:var(--magenta); cursor:pointer;">Change Photo</label>
                <input type="file" id="pfp-upload" accept="image/*" style="display:none;" onchange="previewImage(this)">
            </div>
            <input type="text" id="edit-sys-name" placeholder="System Name">
            <input type="text" id="edit-username" placeholder="Username">
            <textarea id="edit-bio" rows="3" placeholder="Bio..."></textarea>
            <button class="main-btn" onclick="saveSettings()">Save Changes</button>
            <button class="main-btn" style="background:#ccc; margin-top:10px;" onclick="showTab('overview')">Cancel</button>
        </section>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" id="tab-overview" onclick="showTab('overview')"><span>🏠</span>Home</button>
        <a href="alters.html" class="nav-item"><span>👥</span>Alters</a>
        <a href="mobileinternal.html" class="nav-item"><span>💭</span>Internal</a>
        <a href="mobilechat.html" class="nav-item"><span>🌎</span>Global</a>
        <button class="nav-item" id="tab-sidekicks" onclick="showTab('sidekicks')"><span>✨</span>Friends</button>
    </nav>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);
let systemData = { name: '', bio: '', pfp: '', members: [], history: [] };
let currentUser = null;
let currentUsername = "";

function updateLoading(percent) {
    const bar = document.getElementById('load-bar');
    const star = document.getElementById('load-star');
    if(bar) bar.style.width = percent + '%';
    if(star) star.style.left = Math.max(0, percent - 8) + '%';
}

async function handleAuth() {
    const email = document.getElementById('email-input').value;
    const password = document.getElementById('passcode-input').value;
    try {
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if(error) throw error;
        location.reload();
    } catch(e) { alert("Login failed: " + e.message); }
}

async function loadData() {
    try {
        updateLoading(30);
        const { data: { user }, error: userError } = await _supabase.auth.getUser();
        
        if (!user || userError) {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
            return;
        };

        currentUser = user;
        updateLoading(60);
        
        const { data, error: profileError } = await _supabase.from('profiles').select('*').eq('user_id', user.id).single();
        
        // Safety Check: Initialize systemData if profile or system_data is missing
        if (data) {
            systemData = data.system_data || { members: [], history: [], bio: "" };
            if (!systemData.members) systemData.members = [];
            if (!systemData.history) systemData.history = [];
            currentUsername = data.username || "user";
        }

        updateLoading(85);
        refreshUI();
        
        try {
            await loadFriendsLive();
        } catch (e) { console.warn("Friends failed to load, continuing..."); }

        updateLoading(100);
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }, 500);

    } catch (err) { 
        console.error("Critical Load Error:", err);
        // Force show dashboard even if things are broken so user isn't stuck
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }
}

function refreshUI() {
    document.getElementById('view-sys-name').innerText = systemData.name || "System";
    document.getElementById('view-sys-user').innerText = "@" + (currentUsername || "username");
    document.getElementById('sys-pfp-display').src = systemData.pfp || "https://via.placeholder.com/150";
    
    const fDisp = document.getElementById('fronting-display');
    const oList = document.getElementById('overview-list');
    const hList = document.getElementById('front-history-list');
    
    if(fDisp) fDisp.innerHTML = ''; 
    if(oList) oList.innerHTML = ''; 
    if(hList) hList.innerHTML = '';

    (systemData.members || []).forEach(m => {
        if(m.isFronting) {
            fDisp.innerHTML += `<div class="front-bubble"><button class="remove-front-dot" onclick="toggleFront(${m.id})">×</button><img src="${m.pfp}" class="mini-pfp" style="border-color:${m.color}"><div style="font-size:0.6rem; font-weight:bold; margin-top:2px;">${m.name}</div></div>`;
        }
        oList.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 8px solid ${m.color}"><strong>${m.name}</strong><button class="main-btn" style="width:auto; padding:8px 12px; margin:0;" onclick="toggleFront(${m.id})">${m.isFronting ? 'Leave' : 'Front'}</button></div>`;
    });

    const hist = [...(systemData.history || [])].reverse().slice(0, 5);
    if(hist.length === 0) {
        if(hList) hList.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">No history yet</div>';
    } else {
        hist.forEach((entry) => {
            const timeStr = entry.startTime ? new Date(entry.startTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--:--';
            hList.innerHTML += `<div class="history-card"><img src="${entry.pfp}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;"><div style="flex:1"><div style="font-size:0.85rem; font-weight:bold;">${entry.name}</div><div style="font-size:0.7rem; color:#666;">${entry.status || 'Fronting'}</div></div><div style="font-size:0.7rem; color:#bbb;">${timeStr}</div></div>`;
        });
    }
}

async function toggleFront(id) {
    const mIdx = systemData.members.findIndex(m => m.id == id);
    if (mIdx === -1) return;
    const m = systemData.members[mIdx];
    const now = new Date();

    if(!m.isFronting) {
        const s = prompt(`Status for ${m.name}?`);
        systemData.members[mIdx].isFronting = true;
        systemData.members[mIdx].status = s || "Fronting";
        systemData.members[mIdx].startTime = now.toISOString();
        if(!systemData.history) systemData.history = [];
        systemData.history.push({ 
            id: m.id, 
            name: m.name, 
            pfp: m.pfp, 
            status: s || "Fronting", 
            startTime: now.toISOString(), 
            timestamp: now.toISOString() 
        });
    } else {
        const start = new Date(m.startTime);
        const duration = Math.round((now - start) / 60000);
        const entry = systemData.history.findLast(h => h.id == id && !h.endTime);
        if(entry) { 
            entry.endTime = now.toISOString(); 
            entry.duration = Math.max(0, duration); 
        }
        systemData.members[mIdx].isFronting = false;
        systemData.members[mIdx].status = "";
    }
    refreshUI(); 
    await sync();
}

async function sync() { 
    if(!currentUser) return;
    await _supabase.from('profiles').update({ system_data: systemData }).eq('user_id', currentUser.id); 
    showToast("Synced ✨"); 
}

function showToast(m) { 
    const t = document.getElementById('toast'); 
    if(t) { t.innerText = m; t.className = 'show'; setTimeout(() => t.className = '', 2000); }
}

async function logout() { await _supabase.auth.signOut(); location.reload(); }

function showTab(id) { 
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); 
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); 
    const target = document.getElementById(id);
    if(target) target.classList.add('active'); 
    const navBtn = document.getElementById('tab-'+id); 
    if(navBtn) navBtn.classList.add('active'); 
}

function clearHistory() { 
    if(confirm("Clear history?")) { systemData.history = []; sync(); refreshUI(); } 
}

async function loadFriendsLive() {
    const cont = document.getElementById('friends-list-container');
    if(!cont) return;
    const { data: conn } = await _supabase.from('connections').select('friend_id').eq('user_id', currentUser.id);
    if (!conn || conn.length === 0) return;
    const { data: profs } = await _supabase.from('profiles').select('username, system_data').in('user_id', conn.map(c => c.friend_id));
    cont.innerHTML = '';
    profs?.forEach(p => {
        const fronts = (p.system_data?.members || []).filter(m => m.isFronting);
        let fH = fronts.length > 0 ? '' : '<div style="font-size:0.75rem; color:#999;">Offline</div>';
        fronts.forEach(f => fH += `<div style="display:flex; align-items:center; gap:8px; margin-top:5px;"><img src="${f.pfp}" style="width:30px; height:30px; border-radius:50%; border:2px solid ${f.color}"><div style="font-size:0.8rem;"><strong>${f.name}</strong>: ${f.status || 'Fronting'}</div></div>`);
        cont.innerHTML += `<div class="card"><strong>@${p.username}</strong>${fH}</div>`;
    });
}

function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => { 
            systemData.pfp = e.target.result; 
            document.getElementById('edit-pfp-preview').src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

async function saveSettings() {
    systemData.name = document.getElementById('edit-sys-name').value;
    currentUsername = document.getElementById('edit-username').value;
    systemData.bio = document.getElementById('edit-bio').value;
    await _supabase.from('profiles').update({ system_data: systemData, username: currentUsername }).eq('user_id', currentUser.id);
    showToast("Profile Updated!");
    refreshUI();
    showTab('overview');
}

function showSettings() {
    document.getElementById('edit-sys-name').value = systemData.name || "";
    document.getElementById('edit-username').value = currentUsername || "";
    document.getElementById('edit-bio').value = systemData.bio || "";
    document.getElementById('edit-pfp-preview').src = systemData.pfp || "https://via.placeholder.com/150";
    showTab('settings');
}

window.onload = loadData;
</script>
</body>
</html>
