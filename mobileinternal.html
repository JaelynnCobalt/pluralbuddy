<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>System Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
    --bg: #fdf2f7;
    --panel: #ffffff;
    --soft-pink: #ffdeeb;
    --magenta: #ff00ff;
    --text: #333;
}

* { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; flex-direction: column; overflow: hidden; }

/* DRAWER MENU */
.sidebar { 
    position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
    background: white; border-right: 1px solid var(--soft-pink);
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
}
.sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(255,0,255,0.1); }
.room-item { padding: 15px 20px; font-weight: 600; color: var(--magenta); border-bottom: 1px solid var(--bg); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.room-item.active { background: var(--soft-pink); }
.lock-icon { font-size: 0.8rem; opacity: 0.6; }

/* HEADER */
.chat-header { 
    padding: 15px; padding-top: calc(15px + env(safe-area-inset-top));
    background: white; border-bottom: 1px solid var(--soft-pink);
    display: flex; align-items: center; gap: 12px; z-index: 1000;
}
.menu-toggle { font-size: 1.2rem; background: none; border: none; color: var(--magenta); padding: 5px; }

/* CHAT AREA */
#chat-display { 
    flex: 1; overflow-y: auto; padding: 15px; 
    display: flex; flex-direction: column; gap: 15px; 
    background: var(--bg);
}

/* MESSAGE BUBBLES */
.message { display: flex; gap: 10px; max-width: 85%; align-self: flex-start; }
.message.own { align-self: flex-end; flex-direction: row-reverse; }

.msg-pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.bubble { 
    background: white; padding: 10px 14px; border-radius: 18px; 
    border-top-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    font-size: 0.95rem; line-height: 1.4; word-wrap: break-word;
}
.own .bubble { 
    background: var(--magenta); color: white; 
    border-radius: 18px; border-top-right-radius: 4px; border-top-left-radius: 18px;
}
.msg-meta { font-size: 0.7rem; color: #999; margin-top: 4px; padding: 0 5px; }
.own .msg-meta { text-align: right; }

/* INPUT AREA */
.input-container { 
    background: white; padding: 10px; border-top: 1px solid var(--soft-pink);
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

.member-picker { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.member-picker::-webkit-scrollbar { display: none; }
.picker-btn { flex: 0 0 auto; width: 45px; height: 45px; border-radius: 50%; border: 3px solid transparent; padding: 2px; transition: 0.2s; }
.picker-btn.active { border-color: var(--magenta); transform: scale(1.1); }
.picker-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

.input-row { display: flex; gap: 8px; align-items: flex-end; }
#msg-input { 
    flex: 1; background: var(--bg); border: 1px solid var(--soft-pink);
    border-radius: 20px; padding: 10px 15px; font-size: 16px;
    max-height: 100px; resize: none; outline: none;
}
.send-btn { 
    background: var(--magenta); color: white; border: none; 
    width: 40px; height: 40px; border-radius: 50%; 
    font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
}

#sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1500; }
</style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid var(--bg); display: flex; justify-content: space-between; align-items: center;">
        <span>Rooms</span>
        <button onclick="addRoom()" style="border:none; background:none; color:var(--magenta); font-size:1.8rem; cursor:pointer;">+</button>
    </div>
    <div id="room-list"></div>
    <div style="position: absolute; bottom: 20px; left: 20px;">
        <a href="mobileindex.html" style="text-decoration: none; color: #888; font-weight: bold;">⇠ Dashboard</a>
    </div>
</div>

<header class="chat-header">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <div style="flex:1">
        <div id="current-room-name" style="font-weight: bold; color: var(--magenta);"># general</div>
        <div id="room-status-label" style="font-size: 0.7rem; color: #999;">Internal System Chat</div>
    </div>
</header>

<div id="chat-display"></div>

<div class="input-container">
    <div class="member-picker" id="member-picker"></div>
    <div class="input-row">
        <textarea id="msg-input" placeholder="Type a message..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" onclick="sendInternalMessage()">↑</button>
    </div>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

// Updated structure: internalRooms[roomName] = { messages: [], pin: null }
let systemData = { members: [], internalRooms: { "general": { messages: [], pin: null } }, activeRoom: "general" };
let currentProxyId = 'system';

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return window.location.href = 'mobileindex.html';
    
    const { data } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
    if (data?.system_data) {
        systemData = data.system_data;
        // Migration check for old data format
        if (!systemData.internalRooms) {
            systemData.internalRooms = { "general": { messages: [], pin: null } };
        } else {
            // Fix any rooms that are just arrays (old format)
            Object.keys(systemData.internalRooms).forEach(key => {
                if (Array.isArray(systemData.internalRooms[key])) {
                    systemData.internalRooms[key] = { messages: systemData.internalRooms[key], pin: null };
                }
            });
        }
    }
    renderRooms();
    renderMemberPicker();
    renderMessages();
}

function renderMemberPicker() {
    const picker = document.getElementById('member-picker');
    picker.innerHTML = `
        <div class="picker-btn ${currentProxyId === 'system' ? 'active' : ''}" onclick="setSpeaker('system', this)">
            <img src="https://via.placeholder.com/150/ff00ff/ffffff?text=SYS">
        </div>`;
    
    (systemData.members || []).forEach(m => {
        picker.innerHTML += `
            <div class="picker-btn ${currentProxyId == m.id ? 'active' : ''}" onclick="setSpeaker('${m.id}', this)">
                <img src="${m.pfp}" style="border: 2px solid ${m.color}">
            </div>`;
    });
}

function setSpeaker(id, el) {
    currentProxyId = id;
    document.querySelectorAll('.picker-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
}

function renderMessages() {
    const display = document.getElementById('chat-display');
    display.innerHTML = '';
    const roomObj = systemData.internalRooms[systemData.activeRoom];
    const messages = roomObj ? roomObj.messages : [];
    
    messages.forEach((msg) => {
        display.innerHTML += `
            <div class="message ${msg.id === currentProxyId ? 'own' : ''}">
                <img src="${msg.pfp}" class="msg-pfp">
                <div class="msg-content">
                    <div class="bubble">${msg.text}</div>
                    <div class="msg-meta">${msg.name} • ${msg.time}</div>
                </div>
            </div>`;
    });
    display.scrollTop = display.scrollHeight;
}

async function sendInternalMessage() {
    const input = document.getElementById('msg-input');
    if (!input.value.trim()) return;

    let speaker = currentProxyId === 'system' 
        ? { name: "System", color: "#ff00ff", pfp: "https://via.placeholder.com/150/ff00ff/ffffff?text=SYS" }
        : systemData.members.find(m => m.id == currentProxyId);

    const newMessage = {
        id: currentProxyId,
        name: speaker.name,
        pfp: speaker.pfp,
        text: input.value,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    };

    systemData.internalRooms[systemData.activeRoom].messages.push(newMessage);
    input.value = '';
    input.style.height = 'auto';
    renderMessages();
    
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').update({ system_data: systemData }).eq('user_id', user.id);
}

function toggleMenu() {
    const side = document.getElementById('sidebar');
    const over = document.getElementById('sidebar-overlay');
    const isOpen = side.classList.toggle('open');
    over.style.display = isOpen ? 'block' : 'none';
}

function switchRoom(room) {
    const roomObj = systemData.internalRooms[room];
    
    // Check for PIN
    if (roomObj.pin) {
        const attempt = prompt("Enter PIN for this room:");
        if (attempt !== roomObj.pin) {
            alert("Incorrect PIN.");
            return;
        }
    }

    systemData.activeRoom = room;
    document.getElementById('current-room-name').innerText = `# ${room}`;
    document.getElementById('room-status-label').innerText = roomObj.pin ? "🔒 PIN Protected Chat" : "Internal System Chat";
    renderRooms();
    renderMessages();
    if (document.getElementById('sidebar').classList.contains('open')) toggleMenu();
}

function renderRooms() {
    const list = document.getElementById('room-list');
    list.innerHTML = '';
    Object.keys(systemData.internalRooms).forEach(roomKey => {
        const isLocked = systemData.internalRooms[roomKey].pin;
        list.innerHTML += `
            <div class="room-item ${systemData.activeRoom === roomKey ? 'active' : ''}" onclick="switchRoom('${roomKey}')">
                <span># ${roomKey}</span>
                ${isLocked ? '<span class="lock-icon">🔒</span>' : ''}
            </div>`;
    });
}

async function addRoom() {
    const name = prompt("New Room Name:");
    if (!name) return;
    
    const slug = name.toLowerCase().replace(/\s+/g, '-');
    if (systemData.internalRooms[slug]) return alert("Room already exists!");

    let pin = null;
    const wantsLock = confirm("Do you want to PIN lock this room?");
    if (wantsLock) {
        pin = prompt("Set a 4-digit PIN:");
        if (!pin || pin.length < 1) {
            alert("Lock cancelled (no PIN entered)");
            pin = null;
        }
    }

    systemData.internalRooms[slug] = { messages: [], pin: pin };
    
    // Sync immediately to save the new room
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').update({ system_data: systemData }).eq('user_id', user.id);
    
    switchRoom(slug);
}

window.onload = loadData;
</script>
</body>
</html>
