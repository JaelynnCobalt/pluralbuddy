<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>System Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg: #fdf2f7; --panel: #ffffff; --soft-pink: #ffdeeb; --magenta: #ff00ff; --text: #333; }
* { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; flex-direction: column; overflow: hidden; }

/* SIDEBAR */
.sidebar { 
    position: fixed; left: -280px; top: 0; width: 280px; height: 100%; 
    background: white; border-right: 1px solid var(--soft-pink); 
    transition: 0.3s; z-index: 2000; display: flex; flex-direction: column; 
}
.sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(255,0,255,0.1); }
.sidebar-content { flex: 1; overflow-y: auto; }

/* CATEGORIES & ROOMS */
.category-header { padding: 20px 10px 5px 15px; font-size: 0.7rem; font-weight: 800; color: #999; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
.room-item { padding: 10px 15px 10px 25px; font-weight: 600; color: #555; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.room-item.active { background: var(--soft-pink); color: var(--magenta); }
.dot-menu { background: none; border: none; color: #ccc; font-size: 1.2rem; padding: 0 5px; cursor: pointer; }

/* BOTTOM NAV IN SIDEBAR */
.sidebar-footer { padding: 20px; border-top: 1px solid var(--soft-pink); background: #fafafa; }
.dash-link { 
    display: block; text-align: center; text-decoration: none; 
    background: var(--magenta); color: white; padding: 12px; 
    border-radius: 12px; font-weight: bold; font-size: 0.9rem;
    box-shadow: 0 4px 10px rgba(255, 0, 255, 0.2);
}

/* CHAT UI */
.chat-header { padding: 15px; padding-top: calc(15px + env(safe-area-inset-top)); background: white; border-bottom: 1px solid var(--soft-pink); display: flex; align-items: center; gap: 12px; }
#chat-display { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: var(--bg); }
.message { display: flex; gap: 10px; max-width: 85%; align-self: flex-start; }
.message.own { align-self: flex-end; flex-direction: row-reverse; }
.msg-pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
.bubble { background: white; padding: 10px 14px; border-radius: 18px; border-top-left-radius: 4px; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
.own .bubble { background: var(--magenta); color: white; border-top-right-radius: 4px; border-top-left-radius: 18px; }

/* INPUT */
.input-container { background: white; padding: 10px; border-top: 1px solid var(--soft-pink); padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
.member-picker { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
.picker-btn { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; }
.picker-btn.active { border-color: var(--magenta); transform: scale(1.1); }
.picker-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.input-row { display: flex; gap: 8px; }
#msg-input { flex: 1; background: var(--bg); border: 1px solid var(--soft-pink); border-radius: 20px; padding: 10px 15px; font-size: 16px; outline: none; resize: none; }
.send-btn { background: var(--magenta); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; }
#sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1500; }
</style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; border-bottom: 1px solid var(--soft-pink); display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: bold; color: var(--magenta);">Internal Space</span>
        <button onclick="addCategory()" style="border:none; background:none; font-size:1.2rem; color: var(--magenta);">📁+</button>
    </div>
    
    <div class="sidebar-content" id="category-list"></div>

    <div class="sidebar-footer">
        <a href="mobileindex.html" class="dash-link">⇠ Return to Dashboard</a>
    </div>
</div>

<header class="chat-header">
    <button style="background:none; border:none; color:var(--magenta); font-size:1.5rem;" onclick="toggleMenu()">☰</button>
    <div style="flex:1">
        <div id="current-room-name" style="font-weight: bold; color: var(--magenta);"># general</div>
    </div>
</header>

<div id="chat-display"></div>

<div class="input-container">
    <div class="member-picker" id="member-picker"></div>
    <div class="input-row">
        <textarea id="msg-input" placeholder="Message..." rows="1"></textarea>
        <button class="send-btn" onclick="sendInternalMessage()">↑</button>
    </div>
</div>

<script>
const SB_URL = 'https://ctrbkrwiwpojbzfpsxwl.supabase.co';
const SB_KEY = 'sb_publishable_uK-ihohO48o6BPRW8rmDqQ_LbJnfTI7';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let systemData = { 
    members: [], 
    categories: [{ name: "Text Channels", rooms: { "general": { messages: [], pin: null } } }],
    activeRoom: "general" 
};
let currentProxyId = 'system';

async function loadData() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return window.location.href = 'mobileindex.html';
    const { data } = await _supabase.from('profiles').select('system_data').eq('user_id', user.id).single();
    
    if (data?.system_data) {
        let sd = data.system_data;
        if (!sd.categories) {
            sd.categories = [{ name: "Internal", rooms: sd.internalRooms || { "general": { messages: [], pin: null } } }];
        }
        systemData = sd;
    }
    renderUI();
}

function renderUI() {
    renderSidebar();
    renderMemberPicker();
    renderMessages();
}

function renderSidebar() {
    const list = document.getElementById('category-list');
    list.innerHTML = '';
    systemData.categories.forEach((cat, catIdx) => {
        let catHtml = `<div class="category-header">
            <span onclick="renameCategory(${catIdx})">${cat.name}</span>
            <button onclick="addRoom(${catIdx})" style="border:none; background:none; color:#aaa; font-size:1.2rem;">+</button>
        </div>`;
        Object.keys(cat.rooms).forEach(roomKey => {
            const room = cat.rooms[roomKey];
            catHtml += `
                <div class="room-item ${systemData.activeRoom === roomKey ? 'active' : ''}" onclick="switchRoom('${roomKey}')">
                    <span># ${roomKey} ${room.pin ? '🔒' : ''}</span>
                    <button class="dot-menu" onclick="event.stopPropagation(); showRoomOptions('${roomKey}', ${catIdx})">⋮</button>
                </div>`;
        });
        list.innerHTML += catHtml;
    });
}

function showRoomOptions(roomKey, catIdx) {
    const action = prompt(`Options for #${roomKey}:\n1. Delete Room\n2. Move Category\n3. Rename Room\n4. Change/Add PIN\n(Type number)`);
    if (action === "1") deleteRoom(roomKey, catIdx);
    if (action === "2") moveRoom(roomKey, catIdx);
    if (action === "3") renameRoom(roomKey, catIdx);
    if (action === "4") changePin(roomKey, catIdx);
}

async function deleteRoom(roomKey, catIdx) {
    const room = systemData.categories[catIdx].rooms[roomKey];
    if (room.pin && prompt("Enter PIN to delete:") !== room.pin) return alert("Wrong PIN.");
    if (confirm(`Delete #${roomKey}?`)) {
        delete systemData.categories[catIdx].rooms[roomKey];
        if (systemData.activeRoom === roomKey) systemData.activeRoom = "general";
        await sync(); renderUI();
    }
}

async function renameRoom(roomKey, catIdx) {
    const newName = prompt("New room name:").toLowerCase().replace(/\s+/g, '-');
    if (newName && !systemData.categories[catIdx].rooms[newName]) {
        systemData.categories[catIdx].rooms[newName] = systemData.categories[catIdx].rooms[roomKey];
        delete systemData.categories[catIdx].rooms[roomKey];
        if (systemData.activeRoom === roomKey) systemData.activeRoom = newName;
        await sync(); renderUI();
    }
}

async function changePin(roomKey, catIdx) {
    const room = systemData.categories[catIdx].rooms[roomKey];
    if (room.pin && prompt("Enter current PIN to change it:") !== room.pin) return alert("Wrong PIN.");
    const newPin = prompt("Enter new 4-digit PIN (or leave blank to remove):");
    room.pin = newPin || null;
    await sync(); renderUI();
}

async function renameCategory(idx) {
    const newName = prompt("Rename Category:", systemData.categories[idx].name);
    if (newName) { systemData.categories[idx].name = newName; await sync(); renderUI(); }
}

async function moveRoom(roomKey, oldCatIdx) {
    const names = systemData.categories.map((c, i) => `${i}: ${c.name}`).join('\n');
    const newIdx = prompt(`Move to which category index?\n${names}`);
    if (newIdx !== null && systemData.categories[newIdx]) {
        systemData.categories[newIdx].rooms[roomKey] = systemData.categories[oldCatIdx].rooms[roomKey];
        delete systemData.categories[oldCatIdx].rooms[roomKey];
        await sync(); renderUI();
    }
}

async function addCategory() {
    const name = prompt("Category Name:");
    if (name) { systemData.categories.push({ name, rooms: {} }); await sync(); renderUI(); }
}

async function addRoom(catIdx) {
    const name = prompt("Room Name:").toLowerCase().replace(/\s+/g, '-');
    if (!name) return;
    let pin = confirm("PIN protect?") ? prompt("Set 4-digit PIN:") : null;
    systemData.categories[catIdx].rooms[name] = { messages: [], pin };
    await sync(); switchRoom(name);
}

function switchRoom(roomKey) {
    let targetRoom = null;
    systemData.categories.forEach(c => { if(c.rooms[roomKey]) targetRoom = c.rooms[roomKey]; });
    if (targetRoom?.pin && prompt("Enter PIN:") !== targetRoom.pin) return alert("Access Denied");
    systemData.activeRoom = roomKey;
    document.getElementById('current-room-name').innerText = `# ${roomKey}`;
    renderUI();
    if (document.getElementById('sidebar').classList.contains('open')) toggleMenu();
}

function renderMessages() {
    const display = document.getElementById('chat-display');
    display.innerHTML = '';
    let activeRoomObj = null;
    systemData.categories.forEach(c => { if(c.rooms[systemData.activeRoom]) activeRoomObj = c.rooms[systemData.activeRoom]; });
    if (activeRoomObj) {
        activeRoomObj.messages.forEach(msg => {
            display.innerHTML += `
                <div class="message ${msg.id === currentProxyId ? 'own' : ''}">
                    <img src="${msg.pfp}" class="msg-pfp">
                    <div class="msg-content">
                        <div class="bubble">${msg.text}</div>
                        <div class="msg-meta" style="font-size:0.6rem; color:#999;">${msg.name} • ${msg.time}</div>
                    </div>
                </div>`;
        });
    }
    display.scrollTop = display.scrollHeight;
}

async function sendInternalMessage() {
    const input = document.getElementById('msg-input');
    if (!input.value.trim()) return;
    let speaker = currentProxyId === 'system' ? { name: "System", pfp: "https://via.placeholder.com/150/ff00ff/ffffff?text=SYS" } : systemData.members.find(m => m.id == currentProxyId);
    const msg = { id: currentProxyId, name: speaker.name, pfp: speaker.pfp, text: input.value, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
    systemData.categories.forEach(c => { if (c.rooms[systemData.activeRoom]) c.rooms[systemData.activeRoom].messages.push(msg); });
    input.value = ''; renderMessages(); await sync();
}

async function sync() {
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('profiles').update({ system_data: systemData }).eq('user_id', user.id);
}

function renderMemberPicker() {
    const picker = document.getElementById('member-picker');
    picker.innerHTML = `<div class="picker-btn ${currentProxyId==='system'?'active':''}" onclick="setSpeaker('system')"><img src="https://via.placeholder.com/150/ff00ff/ffffff?text=SYS"></div>`;
    systemData.members.forEach(m => { picker.innerHTML += `<div class="picker-btn ${currentProxyId==m.id?'active':''}" onclick="setSpeaker('${m.id}')"><img src="${m.pfp}"></div>`; });
}

function setSpeaker(id) { currentProxyId = id; renderMemberPicker(); renderMessages(); }
function toggleMenu() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebar-overlay');
    const open = s.classList.toggle('open');
    o.style.display = open ? 'block' : 'none';
}

window.onload = loadData;
</script>
</body>
</html>
